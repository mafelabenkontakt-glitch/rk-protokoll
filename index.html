<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RK CLOUD OS - Tactical V5</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --rk-red: #E2001A;
            --rk-dark: #212529;
            --status-crit: #ffcccc;
            --status-ok: #ccffcc;
        }
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        
        /* Tactical Header */
        .rk-header-main { background: var(--rk-red); color: white; padding: 12px; position: sticky; top: 0; z-index: 2000; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .view-section { display: none; padding: 15px; }
        .active-view { display: block !important; }

        /* Module Design */
        .module-card { background: white; border-radius: 12px; padding: 18px; margin-bottom: 20px; border: 1px solid #dee2e6; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
        .module-title { font-size: 0.75rem; font-weight: 800; color: #6c757d; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 5px; }

        /* Symmetrische Buttons & Grids */
        .grid-compact { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .btn-choice { border: 1px solid #ddd; background: #f8f9fa; padding: 10px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; transition: 0.2s; text-align: center; cursor: pointer; }
        .btn-choice.active { background: var(--rk-red); color: white; border-color: var(--rk-red); }

        /* Vitalwerte High Contrast */
        .vital-input { font-size: 1.5rem; font-weight: 900; color: var(--rk-red); text-align: center; border: none; background: #fdfdfd; width: 100%; }
        .vital-box { border: 2px solid #eee; border-radius: 10px; padding: 5px; background: white; }

        /* Bodygramm & Marker */
        .body-canvas { position: relative; width: 100%; max-width: 320px; margin: 0 auto; border: 1px solid #ddd; border-radius: 15px; overflow: hidden; }
        .marker { position: absolute; width: 30px; height: 30px; border-radius: 50%; color: white; font-weight: bold; display: flex; align-items: center; justify-content: center; transform: translate(-50%, -50%); border: 3px solid white; box-shadow: 0 4px 8px rgba(0,0,0,0.4); }

        /* Navigation Fix */
        .nav-bottom { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; border-top: 1px solid #ddd; z-index: 1500; }
        .nav-item { flex: 1; text-align: center; padding: 12px; font-size: 0.7rem; font-weight: bold; color: #666; text-decoration: none; }
        .nav-item.active { color: var(--rk-red); border-top: 3px solid var(--rk-red); }

        /* ABCDE / OPQRST Specifics */
        .abcde-letter { width: 35px; height: 35px; background: var(--rk-red); color: white; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-weight: 900; margin-right: 10px; }
    </style>
</head>
<body>

<div id="loginView" class="active-view d-flex align-items-center justify-content-center" style="height: 100vh; background: var(--rk-red);">
    <div class="bg-white p-5 rounded-4 shadow-lg text-center" style="width: 360px;">
        <h1 class="fw-bold text-danger">RK CLOUD</h1>
        <p class="small text-muted mb-4">Tactical OS V5.0</p>
        <input id="login_dn" class="form-control mb-2 p-3 text-center" placeholder="Dienstnummer">
        <input id="login_pw" type="password" class="form-control mb-4 p-3 text-center" placeholder="Passwort">
        <button onclick="handleLogin()" class="btn btn-dark w-100 py-3 fw-bold rounded-pill">EINSATZ STARTEN</button>
    </div>
</div>

<div id="appInterface" style="display:none;">
    <div class="rk-header-main d-flex justify-content-between align-items-center">
        <span id="header_label" class="fw-bold">JOURNAL</span>
        <button onclick="submitReport()" class="btn btn-light btn-sm fw-bold text-danger">ABSCHLUSS</button>
    </div>

    <div id="listView" class="view-section active-view">
        <button onclick="startNew('RTW')" class="btn btn-danger w-100 py-4 mb-3 rounded-4 shadow fw-bold fs-4">🚑 NEUER EINSATZ</button>
        <div id="protocolList"></div>
    </div>

    <div id="editView" class="view-section">
        <div class="module-card">
            <div class="module-title">Einsatz & Patient</div>
            <div class="row g-2">
                <div class="col-7"><input id="r_p_name" class="form-control" placeholder="Name, Vorname"></div>
                <div class="col-5"><input id="r_e_nr" class="form-control" placeholder="E-Nr"></div>
                <div class="col-7"><input id="r_p_svnr" class="form-control" placeholder="SV-Nr"></div>
                <div class="col-5"><input id="r_p_geb" type="date" class="form-control"></div>
            </div>
        </div>

        <div class="module-card">
            <div class="module-title">ABCDE (Triage)</div>
            <div id="abcde_container">
                <div class="d-flex align-items-center mb-3">
                    <div class="abcde-letter">A</div>
                    <div class="flex-grow-1">
                        <div class="tag-cloud mb-1">
                            <span class="btn-choice me-1" onclick="quickTag('abcde_a','Frei')">Frei</span>
                            <span class="btn-choice me-1" onclick="quickTag('abcde_a','Verlegt')">Verlegt</span>
                        </div>
                        <input id="abcde_a" class="form-control form-control-sm" placeholder="Atemweg Details...">
                    </div>
                </div>
                <div class="d-flex align-items-center mb-3">
                    <div class="abcde-letter">B</div>
                    <div class="flex-grow-1">
                        <div class="tag-cloud mb-1">
                            <span class="btn-choice me-1" onclick="quickTag('abcde_b','Normal')">Normal</span>
                            <span class="btn-choice me-1" onclick="quickTag('abcde_b','Dyspnoe')">Dyspnoe</span>
                        </div>
                        <input id="abcde_b" class="form-control form-control-sm" placeholder="Belüftung Details...">
                    </div>
                </div>
                </div>
        </div>

        <div class="module-card">
            <div class="module-title">Vitalparameter</div>
            <div class="row g-2 text-center">
                <div class="col-4 vital-box"><label class="small text-muted">HF</label><input id="v_hf" type="number" class="vital-input" placeholder="--"></div>
                <div class="col-4 vital-box"><label class="small text-muted">RR</label><input id="v_rr" type="text" class="vital-input" placeholder="--/--"></div>
                <div class="col-4 vital-box"><label class="small text-muted">SpO2</label><input id="v_spo2" type="number" class="vital-input" placeholder="--"></div>
                <div class="col-4 vital-box mt-2"><label class="small text-muted">BZ</label><input id="v_bz" type="number" class="vital-input" placeholder="--"></div>
                <div class="col-4 vital-box mt-2"><label class="small text-muted">GCS</label><input id="v_gcs" type="number" class="vital-input" placeholder="15"></div>
                <div class="col-4 vital-box mt-2"><label class="small text-muted">TEMP</label><input id="v_temp" type="number" class="vital-input" placeholder="36"></div>
            </div>
        </div>

        <div class="module-card">
            <div class="module-title">Anamnese (OPQRST / SAMPLER)</div>
            <div class="grid-compact mb-3">
                <input id="o_o" class="form-control form-control-sm" placeholder="O-Onset">
                <input id="o_p" class="form-control form-control-sm" placeholder="P-Provoke">
                <input id="o_q" class="form-control form-control-sm" placeholder="Q-Quality">
                <input id="o_s" class="form-control form-control-sm" placeholder="S-Severity">
            </div>
            <textarea id="s_meds" class="form-control form-control-sm mb-2" rows="2" placeholder="SAMPLER: Medikamente & Allergien..."></textarea>
        </div>

        <div class="module-card">
            <div class="module-title">Befund (B-S-F)</div>
            <div class="body-canvas">
                <img src="grafik.png" id="bodyImg" class="w-100" style="cursor:crosshair;">
                <div id="markerLayer"></div>
            </div>
            <div class="d-flex justify-content-between mt-3">
                <button class="btn btn-warning w-100 me-1 fw-bold" onclick="mType='S'">SCHMERZ</button>
                <button class="btn btn-primary w-100 me-1 fw-bold" onclick="mType='F'">FRAKTUR</button>
                <button class="btn btn-danger w-100 fw-bold" onclick="mType='W'">WUNDE</button>
            </div>
        </div>
    </div>

    <div class="nav-bottom">
        <a href="#" onclick="switchTab('listView')" class="nav-item active">JOURNAL</a>
        <a href="#" onclick="switchTab('editView')" class="nav-item">EINSATZ</a>
        <a href="#" onclick="generateSBAR()" class="nav-item">SBAR-CHECK</a>
    </div>
</div>

<script>
const SUPABASE_URL = "https://rnfbggoetkmgxqdvznrm.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJuZmJnZ29ldGttZ3hxZHZ6bnJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2ODc5OTAsImV4cCI6MjA5MDI2Mzk5MH0.WIkTaULzTAGgmWEdZ1au35ae826joFGVHP--E-2fsSg";

let currentUser = null;
let markers = [];
let mType = "S";

async function handleLogin() {
    const dn = document.getElementById("login_dn").value;
    const pw = document.getElementById("login_pw").value;
    const res = await fetch(`${SUPABASE_URL}/rest/v1/profiles?dienstnummer=eq.${dn}&passwort=eq.${pw}`, {
        headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
    });
    const data = await res.json();
    if(data.length > 0) {
        currentUser = data[0];
        document.getElementById("loginView").style.display = "none";
        document.getElementById("appInterface").style.display = "block";
        loadReports();
    } else alert("Zugriff verweigert.");
}

function switchTab(id) {
    document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active-view'));
    document.getElementById(id).classList.add('active-view');
}

function quickTag(targetId, val) {
    const el = document.getElementById(targetId);
    el.value = el.value ? el.value + ", " + val : val;
}

document.getElementById("bodyImg").onclick = function(e) {
    let r = this.getBoundingClientRect();
    let x = ((e.clientX - r.left) / r.width) * 100;
    let y = ((e.clientY - r.top) / r.height) * 100;
    let m = document.createElement("div");
    const colors = { S: '#f39c12', F: '#3498db', W: '#c0392b' };
    m.className = "marker";
    m.style.left = x + "%"; m.style.top = y + "%"; 
    m.style.background = colors[mType];
    m.innerText = mType;
    markers.push({type: mType, x, y});
    document.getElementById("markerLayer").appendChild(m);
};

function generateSBAR() {
    const name = document.getElementById("r_p_name").value || "N.N.";
    const hf = document.getElementById("v_hf").value;
    const rr = document.getElementById("v_rr").value;
    const msg = `S: ${name}, Einsatz # ${document.getElementById("r_e_nr").value}\nB: Bekannte Med: ${document.getElementById("s_meds").value}\nA: ABC: ${document.getElementById("abcde_a").value}, Vital: HF ${hf}, RR ${rr}\nR: Transport in Zielklinik.`;
    alert("Vorschlag für Übergabe:\n\n" + msg);
}

async function submitReport() {
    const payload = {
        e_nr: document.getElementById("r_e_nr").value,
        p_name: document.getElementById("r_p_name").value,
        erstellt_von: currentUser.dienstnummer,
        daten: {
            vital: { hf: v_hf.value, rr: v_rr.value, spo2: v_spo2.value, bz: v_bz.value },
            abcde: { a: abcde_a.value, b: abcde_b.value },
            markers: markers
        }
    };
    const res = await fetch(`${SUPABASE_URL}/rest/v1/rd_berichte`, {
        method: "POST",
        headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}`, "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    });
    if(res.ok) { alert("Einsatz erfolgreich gespeichert."); switchTab('listView'); loadReports(); }
}

async function loadReports() {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/rd_berichte?order=created_at.desc&limit=10`, {
        headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
    });
    const data = await res.json();
    document.getElementById("protocolList").innerHTML = data.map(b => `
        <div class="module-card border-start border-danger border-5 py-2">
            <div class="d-flex justify-content-between small"><b>#${b.e_nr}</b><span>${new Date(b.created_at).toLocaleTimeString()}</span></div>
            <div class="fw-bold">${b.p_name || 'Unbekannt'}</div>
        </div>
    `).join('');
}
</script>
</body>
</html>
