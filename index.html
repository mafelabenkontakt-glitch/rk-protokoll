<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RK CLOUD OS - Tactical V5 Demo Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
:root {
    --rk-red: #E2001A;
}
body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
.rk-header-main { background: var(--rk-red); color: white; padding: 12px; position: sticky; top: 0; z-index: 2000; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
.view-section { display: none; padding: 15px; }
.active-view { display: block !important; }
.module-card { background: white; border-radius: 12px; padding: 18px; margin-bottom: 20px; border: 1px solid #dee2e6; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
.module-title { font-size: 0.75rem; font-weight: 800; color: #6c757d; text-transform: uppercase; margin-bottom: 12px; }
.btn-choice { border: 1px solid #ddd; background: #f8f9fa; padding: 5px; border-radius: 5px; font-size: 0.75rem; cursor: pointer; margin-right: 5px;}
.btn-choice.active { background: var(--rk-red); color: white; border-color: var(--rk-red);}
.vital-input { font-size: 1.2rem; font-weight: 700; color: var(--rk-red); text-align: center; border: none; background: #fdfdfd; width: 100%; }
.vital-box { border: 2px solid #eee; border-radius: 10px; padding: 5px; background: white; margin-bottom:5px;}
.body-canvas { position: relative; width: 100%; max-width: 320px; margin: 0 auto; border: 1px solid #ddd; border-radius: 15px; overflow: hidden; }
.marker { position: absolute; width: 25px; height: 25px; border-radius: 50%; color: white; font-weight: bold; display: flex; align-items: center; justify-content: center; transform: translate(-50%, -50%); border: 2px solid white; }
.nav-bottom { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; border-top: 1px solid #ddd; z-index: 1500; }
.nav-item { flex: 1; text-align: center; padding: 10px; font-size: 0.75rem; font-weight: bold; color: #666; text-decoration: none; }
.nav-item.active { color: var(--rk-red); border-top: 3px solid var(--rk-red); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginView" class="active-view d-flex align-items-center justify-content-center" style="height:100vh; background:var(--rk-red);">
  <div class="bg-white p-5 rounded-4 shadow-lg text-center" style="width:360px;">
    <h1 class="fw-bold text-danger">RK CLOUD</h1>
    <p class="small text-muted mb-4">Tactical OS V5.0</p>
    <input id="login_dn" class="form-control mb-2 p-3 text-center" placeholder="Dienstnummer">
    <input id="login_pw" type="password" class="form-control mb-4 p-3 text-center" placeholder="Passwort">
    <button id="loginBtn" class="btn btn-dark w-100 py-3 fw-bold rounded-pill">EINSATZ STARTEN</button>
  </div>
</div>

<!-- APP -->
<div id="appInterface" style="display:none;">

  <div class="rk-header-main d-flex justify-content-between align-items-center">
    <span id="header_label" class="fw-bold">JOURNAL</span>
  </div>

  <!-- LIST / NEW REPORT -->
  <div id="listView" class="view-section active-view">
    <button onclick="startNewReport()" class="btn btn-danger w-100 py-3 mb-3 rounded-4 fw-bold fs-5">🚑 NEUER EINSATZ</button>
    <div id="protocolList"></div>
  </div>

  <!-- EDIT REPORT -->
  <div id="editView" class="view-section">

    <div class="module-card">
      <div class="module-title">Einsatz & Patient</div>
      <div class="row g-2">
        <div class="col-7"><input id="r_p_name" class="form-control" placeholder="Name, Vorname"></div>
        <div class="col-5"><input id="r_e_nr" class="form-control" placeholder="Einsatz-Nr"></div>
        <div class="col-7"><input id="r_p_svnr" class="form-control" placeholder="SV-Nr"></div>
        <div class="col-5"><input id="r_p_geb" type="date" class="form-control"></div>
      </div>
    </div>

    <div class="module-card">
      <div class="module-title">ABCDE (Triage)</div>
      <div id="abcde_container">
        <div class="d-flex align-items-center mb-3">
          <div class="flex-grow-1">
            <span class="btn-choice" onclick="quickTag('abcde_a','Frei')">A-Frei</span>
            <span class="btn-choice" onclick="quickTag('abcde_a','Verlegt')">A-Verlegt</span>
            <input id="abcde_a" class="form-control form-control-sm mt-1" placeholder="Atemweg Details...">
          </div>
        </div>
        <div class="d-flex align-items-center mb-3">
          <div class="flex-grow-1">
            <span class="btn-choice" onclick="quickTag('abcde_b','Normal')">B-Normal</span>
            <span class="btn-choice" onclick="quickTag('abcde_b','Dyspnoe')">B-Dyspnoe</span>
            <input id="abcde_b" class="form-control form-control-sm mt-1" placeholder="Belüftung Details...">
          </div>
        </div>
      </div>
    </div>

    <div class="module-card">
      <div class="module-title">Vitalwerte</div>
      <div class="row g-2 text-center">
        <div class="col-4 vital-box"><label class="small text-muted">HF</label><input id="v_hf" type="number" class="vital-input" placeholder="--"></div>
        <div class="col-4 vital-box"><label class="small text-muted">RR</label><input id="v_rr" type="text" class="vital-input" placeholder="--/--"></div>
        <div class="col-4 vital-box"><label class="small text-muted">SpO2</label><input id="v_spo2" type="number" class="vital-input" placeholder="--"></div>
      </div>
    </div>

    <div class="module-card">
      <div class="module-title">Befund (Marker)</div>
      <div class="body-canvas">
        <img src="https://i.imgur.com/8rkQdNJ.png" id="bodyImg" class="w-100" style="cursor:crosshair;">
        <div id="markerLayer"></div>
      </div>
      <div class="d-flex justify-content-between mt-2">
        <button class="btn btn-warning w-100 me-1 fw-bold" onclick="mType='S'">SCHMERZ</button>
        <button class="btn btn-primary w-100 me-1 fw-bold" onclick="mType='F'">FRAKTUR</button>
        <button class="btn btn-danger w-100 fw-bold" onclick="mType='W'">WUNDE</button>
      </div>
    </div>

    <div class="module-card" id="adminPanel" style="display:none;">
      <div class="module-title">Admin: Neuer Benutzer</div>
      <input id="newUserDN" class="form-control mb-2" placeholder="Dienstnummer">
      <input id="newUserPW" class="form-control mb-2" placeholder="Passwort">
      <button class="btn btn-success w-100" onclick="addNewUser()">Benutzer hinzufügen</button>
      <div id="userList" class="mt-2"></div>
    </div>

  </div>

  <!-- Navigation -->
  <div class="nav-bottom">
    <a href="#" onclick="switchTab('listView')" class="nav-item active">JOURNAL</a>
    <a href="#" onclick="switchTab('editView')" class="nav-item">EINSATZ</a>
  </div>

</div>

<script>
let currentUser = null;
let markers = [];
let mType = "S";

// Demo Benutzer
let users = [
  {dn:"RK-02", pw:"AppearIron22", admin:true},
  {dn:"RK-03", pw:"Test1234", admin:false}
];

document.getElementById("loginBtn").addEventListener("click",()=>{
  const dn = document.getElementById("login_dn").value;
  const pw = document.getElementById("login_pw").value;

  const user = users.find(u => u.dn === dn && u.pw === pw);
  if(user){
    currentUser = user;
    document.getElementById("loginView").style.display="none";
    document.getElementById("appInterface").style.display="block";
    if(user.admin){
      document.getElementById("adminPanel").style.display="block";
      renderUserList();
    }
    alert("Login erfolgreich! Willkommen "+dn);
  }else{
    alert("Zugriff verweigert. Dienstnummer oder Passwort falsch.");
  }
});

// Navigation
function switchTab(id){
  document.querySelectorAll(".view-section").forEach(v=>v.classList.remove("active-view"));
  document.getElementById(id).classList.add("active-view");
  document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active"));
  event.target.classList.add("active");
}

// ABCDE Tags
function quickTag(target,val){
  const el=document.getElementById(target);
  el.value = el.value ? el.value + ", " + val : val;
}

// Marker
document.getElementById("bodyImg").onclick=function(e){
  const r=this.getBoundingClientRect();
  const x=((e.clientX - r.left)/r.width)*100;
  const y=((e.clientY - r.top)/r.height)*100;
  const m=document.createElement("div");
  const colors={S:'#f39c12',F:'#3498db',W:'#c0392b'};
  m.className="marker";
  m.style.left=x+"%"; m.style.top=y+"%";
  m.style.background=colors[mType];
  m.innerText=mType;
  markers.push({type:mType,x,y});
  document.getElementById("markerLayer").appendChild(m);
};

// Neuer Einsatz
function startNewReport(){
  switchTab('editView');
  markers=[];
  document.getElementById("r_p_name").value="";
  document.getElementById("r_e_nr").value="";
  document.getElementById("v_hf").value="";
  document.getElementById("v_rr").value="";
  document.getElementById("v_spo2").value="";
  document.getElementById("abcde_a").value="";
  document.getElementById("abcde_b").value="";
  document.getElementById("markerLayer").innerHTML="";
}

// Admin: Benutzer hinzufügen
function addNewUser(){
  const dn=document.getElementById("newUserDN").value;
  const pw=document.getElementById("newUserPW").value;
  if(dn && pw){
    users.push({dn,pw,admin:false});
    renderUserList();
    alert("Neuer Benutzer hinzugefügt: "+dn);
    document.getElementById("newUserDN").value="";
    document.getElementById("newUserPW").value="";
  } else alert("Dienstnummer und Passwort ausfüllen.");
}

function renderUserList(){
  const list = document.getElementById("userList");
  list.innerHTML = users.map(u=>u.dn+(u.admin?" (Admin)":"")).join("<br>");
}

</script>

</body>
</html>
