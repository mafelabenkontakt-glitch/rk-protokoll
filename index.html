<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RK CLOUD OS | MAX FINAL</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.5/dist/signature_pad.umd.min.js"></script>

    <style>
        :root { --rk-red: #e2001a; --rk-dark: #b30014; --rk-grey: #2c3e50; }
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; padding-bottom: 80px; }
        
        .rk-header { 
            background: linear-gradient(180deg, var(--rk-red) 0%, var(--rk-dark) 100%); 
            color: white; padding: 25px; text-align: center; border-radius: 0 0 30px 30px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); position: sticky; top: 0; z-index: 1000;
        }

        .section-header { 
            background: var(--rk-grey); color: white; padding: 15px; font-weight: 900; 
            border-left: 12px solid var(--rk-red); margin: 35px 0 15px 0; border-radius: 8px; 
            text-transform: uppercase; letter-spacing: 1px;
        }

        .card-custom { background: white; border-radius: 25px; padding: 30px; margin-bottom: 25px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        /* BODYGRAMM MIT DEINER QUELLE grafik.png */
        .body-container { position: relative; width: 100%; max-width: 420px; margin: auto; background: white; border: 3px solid #eee; border-radius: 20px; padding: 10px; }
        .body-img { width: 100%; height: auto; display: block; cursor: crosshair; user-select: none; }
        .marker { position: absolute; width: 36px; height: 36px; border-radius: 50%; color: white; font-weight: bold; display: flex; align-items: center; justify-content: center; transform: translate(-50%, -50%); border: 3px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 100; }
        .m-S { background: #fd7e14; } .m-F { background: #0d6efd; } .m-W { background: #dc3545; }
        
        .vital-input { font-size: 1.2rem; font-weight: 800; text-align: center; color: var(--rk-red); }
        .active-view { display: block !important; }
        #mainAppRTW, #mainAppKTW, #listView, #flowSelect, #loginView { display: none; }
        .sig-canvas { border: 2px dashed #ccc; width: 100%; height: 220px; background: #fafafa; border-radius: 15px; }
    </style>
</head>
<body>

<div id="loginView" class="active-view">
    <div style="height:100vh; display:flex; align-items:center; justify-content:center; background:var(--rk-red);">
        <div class="card-custom text-center" style="width:400px;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/3/31/Red_Cross_icon.svg" width="80" class="mb-3">
            <h2 class="fw-bold mb-4">RK CLOUD SYSTEM</h2>
            <input type="text" id="login_dn" class="form-control mb-3 p-3 rounded-pill text-center" placeholder="Dienstnummer">
            <input type="password" id="login_pw" class="form-control mb-4 p-3 rounded-pill text-center" placeholder="Passwort">
            <button onclick="handleLogin()" class="btn btn-danger w-100 p-3 rounded-pill fw-bold shadow">LOGIN</button>
            <div id="loginError" class="mt-3 text-danger fw-bold"></div>
        </div>
    </div>
</div>

<div id="listView" class="container mt-3">
    <div class="rk-header mb-4">
        <h1 class="fw-bold">EINSATZ-JOURNAL</h1>
        <button class="btn btn-light fw-bold px-4 rounded-pill mt-2" onclick="showFlowSelect()">➕ NEUER EINSATZ</button>
    </div>
    <div class="card-custom"><table class="table table-hover"><thead><tr><th>E-NR</th><th>TYP</th><th>ZEIT</th></tr></thead><tbody id="protocolTableBody"></tbody></table></div>
</div>

<div id="flowSelect" class="container mt-5 text-center">
    <h1 class="fw-bold mb-4">PROTOKOLL-TYP</h1>
    <div class="row g-3">
        <div class="col-6"><button class="btn btn-danger w-100 py-5 fs-2 fw-bold rounded-4 shadow" onclick="startFlow('RTW')">🚑 RTW</button></div>
        <div class="col-6"><button class="btn btn-primary w-100 py-5 fs-2 fw-bold rounded-4 shadow" onclick="startFlow('KTW')">🚐 KTW</button></div>
    </div>
</div>

<div id="mainAppRTW" class="container mt-3">
    <div class="rk-header mb-3"><h2>🚑 NOTFALLPROTOKOLL (ABCDE)</h2></div>
    <form id="rtwForm">
        
        <div class="section-header">1. Checkliste & Zeiten</div>
        <div class="card-custom">
            <div class="form-check fs-5"><input type="checkbox" checked class="form-check-input"> <label>EKG/Defi & O2 bereit</label></div>
            <div class="form-check fs-5 mb-3"><input type="checkbox" checked class="form-check-input"> <label>Rucksack & Absaugung geprüft</label></div>
            <div class="row g-2">
                <div class="col-4"><label class="small fw-bold">Alarm</label><input type="time" id="r_t_alarm" class="form-control"></div>
                <div class="col-4"><label class="small fw-bold">S3 (Ank)</label><input type="time" id="r_t_s3" class="form-control"></div>
                <div class="col-4"><label class="small fw-bold">S7 (Ziel)</label><input type="time" id="r_t_s7" class="form-control"></div>
            </div>
            <input type="text" id="r_e_nr" class="form-control mt-3 p-3" placeholder="Einsatz-Nummer" required>
            <input type="text" id="r_p_name" class="form-control mt-2 p-3" placeholder="Patienten-Name">
        </div>

        <div class="section-header">2. ABCDE & Vitalwerte</div>
        <div class="card-custom">
            <div class="row g-3 mb-4">
                <div class="col-4 text-center"><label class="small fw-bold">AF</label><input type="number" id="r_v_af" class="form-control vital-input"></div>
                <div class="col-4 text-center"><label class="small fw-bold">SpO2</label><input type="number" id="r_v_sp" class="form-control vital-input"></div>
                <div class="col-4 text-center"><label class="small fw-bold">HF</label><input type="number" id="r_v_hf" class="form-control vital-input"></div>
            </div>
            <div class="row g-3 mb-4">
                <div class="col-6"><label class="small fw-bold">RR Syst.</label><input type="number" id="r_v_rrs" class="form-control vital-input"></div>
                <div class="col-6"><label class="small fw-bold">RR Diast.</label><input type="number" id="r_v_rrd" class="form-control vital-input"></div>
            </div>
            <div class="row g-3">
                <div class="col-6"><label class="small fw-bold">BZ mg/dl</label><input type="number" id="r_v_bz" class="form-control vital-input"></div>
                <div class="col-6"><label class="small fw-bold">GCS</label><input type="number" id="r_v_gcs" class="form-control vital-input" placeholder="15"></div>
            </div>
        </div>

        <div class="section-header">3. SAMPLER Anamnese</div>
        <div class="card-custom">
            <input type="text" id="r_s_s" class="form-control mb-2" placeholder="S - Symptome">
            <input type="text" id="r_s_a" class="form-control mb-2" placeholder="A - Allergien">
            <input type="text" id="r_s_m" class="form-control mb-2" placeholder="M - Medikamente">
            <input type="text" id="r_s_p" class="form-control mb-2" placeholder="P - Patientengeschichte">
            <input type="text" id="r_s_l" class="form-control mb-2" placeholder="L - Letzte Mahlzeit">
            <input type="text" id="r_s_e" class="form-control" placeholder="E - Ereignis">
        </div>

        <div class="section-header">4. OPQRST Schmerzschema</div>
        <div class="card-custom">
            <input type="text" id="r_o_o" class="form-control mb-2" placeholder="O - Onset (Beginn)">
            <input type="text" id="r_o_p" class="form-control mb-2" placeholder="P - Provokation">
            <input type="text" id="r_o_q" class="form-control mb-2" placeholder="Q - Qualität (stechend/dumpf)">
            <input type="text" id="r_o_r" class="form-control mb-2" placeholder="R - Region / Ausstrahlung">
            <input type="text" id="r_o_s" class="form-control mb-2" placeholder="S - Severity (Stärke 1-10)">
            <input type="text" id="r_o_t" class="form-control" placeholder="T - Time (Verlauf)">
        </div>

        <div class="section-header">5. Bodygramm</div>
        <div class="card-custom text-center">
            <div class="body-container" id="bodyWrapper">
                <img src="grafik.png" id="bodyImg" class="body-img" alt="Bodygramm">
            </div>
            <div class="btn-group w-100 mt-3 shadow-sm rounded-pill overflow-hidden">
                <button type="button" class="btn btn-warning fw-bold" onclick="mType='S'">SCHMERZ (S)</button>
                <button type="button" class="btn btn-primary fw-bold" onclick="mType='F'">FRAKTUR (F)</button>
                <button type="button" class="btn btn-danger fw-bold" onclick="mType='W'">WUNDE (W)</button>
            </div>
            <button type="button" class="btn btn-link text-muted mt-2" onclick="clearMarkers()">Marker löschen</button>
        </div>

        <div class="section-header">6. Bericht & Signatur</div>
        <div class="card-custom">
            <textarea id="r_bericht" class="form-control mb-4" rows="10" placeholder="Zusätzliche Maßnahmen & Verlauf..."></textarea>
            <label class="fw-bold mb-2">Unterschrift Sanitäter</label>
            <canvas id="sig-rtw" class="sig-canvas mb-3"></canvas>
            <button type="submit" class="btn btn-danger w-100 py-4 fs-3 fw-bold rounded-pill shadow-lg">BERICHT ÜBERMITTELN</button>
        </div>
    </form>
</div>

<script>
    const SUPABASE_URL = 'https://rnfbggoetkmgxqdvznrm.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJuZmJnZ29ldGttZ3hxZHZ6bnJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2ODc5OTAsImV4cCI6MjA5MDI2Mzk5MH0.WIkTaULzTAGgmWEdZ1au35ae826joFGVHP--E-2fsSg';
    const DISCORD = 'https://discord.com/api/webhooks/1487187005485093155/BrI0fLWg7rhSLDnRJBzM5oxyhl0vGIoBs7HHGsbrsgFhXmY-RlS8TLKrBAH7MyJpVzQT';

    let _db, user = null, markers = [], mType = 'S', sigPad;

    window.onload = () => {
        _db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const saved = localStorage.getItem('rk_user');
        if(saved) {
            user = JSON.parse(saved);
            document.getElementById('loginView').style.display = 'none';
            document.getElementById('listView').classList.add('active-view');
            loadProtocols();
        }
        sigPad = new SignaturePad(document.getElementById('sig-rtw'));
    };

    async function handleLogin() {
        const dn = document.getElementById('login_dn').value.trim();
        const pw = document.getElementById('login_pw').value.trim();
        const { data } = await _db.from('profiles').select('*').eq('dienstnummer', dn).single();
        if(data && data.passwort === pw) {
            localStorage.setItem('rk_user', JSON.stringify(data));
            location.reload();
        } else {
            document.getElementById('loginError').innerText = "Zugangsdaten ungültig!";
        }
    }

    function showFlowSelect() { hideAll(); document.getElementById('flowSelect').classList.add('active-view'); }
    function startFlow(t) { hideAll(); document.getElementById('mainAppRTW').classList.add('active-view'); }
    function hideAll() { document.querySelectorAll('.active-view').forEach(v => v.classList.remove('active-view')); }
    function clearMarkers() { markers = []; document.querySelectorAll('.marker').forEach(m => m.remove()); }

    document.getElementById('bodyImg').onclick = function(e) {
        const rect = this.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width * 100;
        const y = (e.clientY - rect.top) / rect.height * 100;
        markers.push({x, y, label: mType});
        const d = document.createElement('div');
        d.className = `marker m-${mType}`; d.style.left = x + '%'; d.style.top = y + '%'; d.innerText = mType;
        document.getElementById('bodyWrapper').appendChild(d);
    };

    document.getElementById('rtwForm').onsubmit = async (e) => {
        e.preventDefault();
        const payload = {
            typ: 'RTW', e_nr: document.getElementById('r_e_nr').value, p_name: document.getElementById('r_p_name').value,
            daten: { 
                bericht: document.getElementById('r_bericht').value, markers: markers,
                vital: { bz: document.getElementById('r_v_bz').value, gcs: document.getElementById('r_v_gcs').value },
                sampler: { s: document.getElementById('r_s_s').value, m: document.getElementById('r_s_m').value }
            },
            erstellt_von: user.dienstnummer
        };
        await _db.from('rd_berichte').insert([payload]);
        await fetch(DISCORD, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ content: `🚨 NEU: ${payload.e_nr} (${user.dienstnummer})` })});
        alert("PROTOKOLL ÜBERMITTELT!"); location.reload();
    };

    async function loadProtocols() {
        const { data } = await _db.from('rd_berichte').select('*').order('created_at', {ascending: false});
        if(data) document.getElementById('protocolTableBody').innerHTML = data.map(p => `<tr><td><b>${p.e_nr}</b></td><td>${p.typ}</td><td>${new Date(p.created_at).toLocaleTimeString()}</td></tr>`).join('');
    }
</script>
</body>
</html>
