<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RK CLOUD OS | MAXIMUM V14</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.5/dist/signature_pad.umd.min.js"></script>

    <style>
        :root { --rk-red: #e2001a; --rk-dark: #b30014; --rk-grey: #2c3e50; }
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; padding-bottom: 100px; }
        
        .rk-header { 
            background: linear-gradient(180deg, var(--rk-red) 0%, var(--rk-dark) 100%); 
            color: white; padding: 30px; text-align: center; border-bottom: 6px solid rgba(0,0,0,0.2);
            border-radius: 0 0 40px 40px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .section-header {
            background: var(--rk-grey); color: white; padding: 18px; font-weight: 900;
            text-transform: uppercase; border-left: 15px solid var(--rk-red);
            margin: 45px 0 20px 0; border-radius: 10px; display: flex; justify-content: space-between; align-items: center;
        }

        .card-custom { 
            background: white; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); 
            padding: 35px; margin-bottom: 30px; border: none;
        }

        /* VITALWERTE GRID */
        .vital-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .vital-item { text-align: center; background: #f8f9fa; padding: 15px; border-radius: 15px; border: 1px solid #ddd; }
        .vital-item label { display: block; font-size: 0.75rem; font-weight: 800; color: #666; margin-bottom: 5px; }
        .vital-item input { width: 100%; border: none; background: transparent; text-align: center; font-size: 1.3rem; font-weight: 900; color: var(--rk-red); }

        /* BODYGRAMM FIX */
        .body-container { position: relative; width: 100%; max-width: 450px; margin: 30px auto; background: white; border: 5px solid #eee; border-radius: 40px; padding: 20px; }
        .body-img { width: 100%; height: auto; cursor: crosshair; user-select: none; }
        .marker { position: absolute; width: 38px; height: 38px; border-radius: 50%; color: white; font-weight: 900; display: flex; align-items: center; justify-content: center; transform: translate(-50%, -50%); border: 3px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 100; pointer-events: none; }
        .m-S { background: #fd7e14; } .m-F { background: #0d6efd; } .m-W { background: #dc3545; }

        #loginView { position: fixed; inset: 0; background: var(--rk-red); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .active-view { display: block !important; }
        #mainAppRTW, #mainAppKTW, #listView, #flowSelect { display: none; }
        .sig-canvas { border: 3px dashed #ddd; background: #fafafa; width: 100%; height: 220px; border-radius: 20px; }
    </style>
</head>
<body>

<div id="loginView" class="active-view">
    <div class="card-custom text-center" style="width: 400px;">
        <h2 class="fw-bold mb-4">RK CLOUD LOGIN</h2>
        <input type="text" id="login_dn" class="form-control mb-3 p-3 rounded-pill text-center" placeholder="Dienstnummer (z.B. RK-01)">
        <input type="password" id="login_pw" class="form-control mb-4 p-3 rounded-pill text-center" placeholder="Passwort">
        <button onclick="handleLogin()" class="btn btn-danger w-100 p-3 rounded-pill fw-bold">SYSTEM STARTEN</button>
        <div id="loginError" class="mt-3 text-danger fw-bold"></div>
    </div>
</div>

<div id="listView" class="container mt-4">
    <div class="rk-header mb-5">
        <h1 class="fw-bold">EINSATZ-JOURNAL</h1>
        <button class="btn btn-light btn-lg fw-bold px-5 rounded-pill shadow mt-3" onclick="showFlowSelect()">➕ NEU</button>
    </div>
    <div class="card-custom">
        <table class="table align-middle">
            <thead class="table-light"><tr><th>NR</th><th>DATUM</th><th>TYP</th></tr></thead>
            <tbody id="protocolTableBody"></tbody>
        </table>
    </div>
</div>

<div id="flowSelect" class="container mt-5 text-center">
    <h1 class="display-4 fw-bold mb-5">EINSATZ-TYP</h1>
    <div class="row g-4 justify-content-center">
        <div class="col-6"><button class="btn btn-danger w-100 py-5 fs-1 fw-bold rounded-4" onclick="startFlow('RTW')">🚑 RTW</button></div>
        <div class="col-6"><button class="btn btn-primary w-100 py-5 fs-1 fw-bold rounded-4" onclick="startFlow('KTW')">🚐 KTW</button></div>
    </div>
</div>

<div id="mainAppRTW" class="container mt-3">
    <div class="rk-header mb-4">
        <button class="btn btn-light btn-sm float-start fw-bold" onclick="showList()">⬅ ZURÜCK</button>
        <h2 class="fw-bold">🚑 RTW NOTFALLPROTOKOLL</h2>
    </div>

    <form id="rtwForm">
        <div class="section-header">1. Einsatzdaten & Zeiten</div>
        <div class="card-custom">
            <div class="row g-3 text-center mb-4">
                <div class="col-4"><label class="small fw-bold">ALARM</label><input type="time" id="r_t_alarm" class="form-control"></div>
                <div class="col-4"><label class="small fw-bold">S3 (Ank)</label><input type="time" id="r_t_s3" class="form-control"></div>
                <div class="col-4"><label class="small fw-bold">S7 (Ziel)</label><input type="time" id="r_t_s7" class="form-control"></div>
            </div>
            <input type="text" id="r_e_nr" class="form-control p-3 mb-2 fw-bold" placeholder="Einsatz-Nummer" required>
            <input type="text" id="r_p_name" class="form-control p-3" placeholder="Name des Patienten">
        </div>

        <div class="section-header">2. Vitalparameter (ABCDE)</div>
        <div class="card-custom">
            <div class="vital-grid">
                <div class="vital-item"><label>AF</label><input type="number" id="r_v_af"></div>
                <div class="vital-item"><label>SpO2</label><input type="number" id="r_v_sp"></div>
                <div class="vital-item"><label>EtCO2</label><input type="number" id="r_v_et"></div>
            </div>
            <div class="vital-grid">
                <div class="vital-item"><label>HF</label><input type="number" id="r_v_hf"></div>
                <div class="vital-item"><label>RR SYST</label><input type="number" id="r_v_rrs"></div>
                <div class="vital-item"><label>RR DIAST</label><input type="number" id="r_v_rrd"></div>
            </div>
            <div class="vital-grid">
                <div class="vital-item"><label>BZ</label><input type="number" id="r_v_bz"></div>
                <div class="vital-item"><label>GCS</label><input type="number" id="r_v_gcs" placeholder="15"></div>
                <div class="vital-item"><label>TEMP</label><input type="number" id="r_v_temp" step="0.1"></div>
            </div>
        </div>

        <div class="section-header">3. SAMPLER Anamnese</div>
        <div class="card-custom">
            <div class="mb-3"><label class="fw-bold">S (Symptome):</label><input type="text" id="r_s_s" class="form-control p-3"></div>
            <div class="mb-3"><label class="fw-bold">A (Allergien):</label><input type="text" id="r_s_a" class="form-control p-3"></div>
            <div class="mb-3"><label class="fw-bold">M (Medikamente):</label><input type="text" id="r_s_m" class="form-control p-3"></div>
            <div class="mb-3"><label class="fw-bold">P (Patientengeschichte):</label><input type="text" id="r_s_p" class="form-control p-3"></div>
            <div class="mb-3"><label class="fw-bold">L (Letzte Mahlzeit):</label><input type="text" id="r_s_l" class="form-control p-3"></div>
            <div class="mb-0"><label class="fw-bold">E (Ereignis):</label><input type="text" id="r_s_e" class="form-control p-3"></div>
        </div>

        <div class="section-header">4. OPQRST Schmerz-Schema</div>
        <div class="card-custom">
            <div class="mb-3"><label class="fw-bold">O (Onset/Beginn):</label><input type="text" id="r_o_o" class="form-control p-3"></div>
            <div class="mb-3"><label class="fw-bold">P (Provokation):</label><input type="text" id="r_o_p" class="form-control p-3"></div>
            <div class="mb-3"><label class="fw-bold">Q (Qualität):</label><input type="text" id="r_o_q" class="form-control p-3"></div>
            <div class="mb-3"><label class="fw-bold">R (Region/Ausstrahlung):</label><input type="text" id="r_o_r" class="form-control p-3"></div>
            <div class="row">
                <div class="col-6"><label class="fw-bold">S (Stärke 1-10):</label><input type="number" id="r_o_s" class="form-control p-3"></div>
                <div class="col-6"><label class="fw-bold">T (Time/Verlauf):</label><input type="text" id="r_o_t" class="form-control p-3"></div>
            </div>
        </div>

        <div class="section-header">5. Bodygramm</div>
        <div class="card-custom text-center">
            <div class="body-container" id="bodyWrapper">
                <img src="grafik.png" id="bodyImg" class="body-img" alt="Human Body">
            </div>
            <div class="btn-group w-100 mt-3 shadow rounded-pill overflow-hidden">
                <button type="button" class="btn btn-warning fw-bold py-3" onclick="mType='S'">SCHMERZ (S)</button>
                <button type="button" class="btn btn-primary fw-bold py-3" onclick="mType='F'">FRAKTUR (F)</button>
                <button type="button" class="btn btn-danger fw-bold py-3" onclick="mType='W'">WUNDE (W)</button>
            </div>
            <button type="button" class="btn btn-link text-muted mt-3" onclick="clearMarkers()">Marker löschen</button>
        </div>

        <div class="section-header">6. Verlauf & Unterschrift</div>
        <div class="card-custom">
            <textarea id="r_bericht" class="form-control mb-4" rows="12" placeholder="Zusätzliche Maßnahmen und vollständiger Übergabebericht..."></textarea>
            <canvas id="sig-rtw" class="sig-canvas mb-4"></canvas>
            <button type="submit" class="btn btn-danger w-100 py-4 fs-2 fw-bold rounded-pill shadow-lg">🚨 PROTOKOLL ABSCHLIESSEN</button>
        </div>
    </form>
</div>

<script>
    const SUPABASE_URL = 'https://rnfbggoetkmgxqdvznrm.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJuZmJnZ29ldGttZ3hxZHZ6bnJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2ODc5OTAsImV4cCI6MjA5MDI2Mzk5MH0.WIkTaULzTAGgmWEdZ1au35ae826joFGVHP--E-2fsSg';
    const DISCORD = 'https://discord.com/api/webhooks/1487187005485093155/BrI0fLWg7rhSLDnRJBzM5oxyhl0vGIoBs7HHGsbrsgFhXmY-RlS8TLKrBAH7MyJpVzQT';

    let _db, user = null, markers = [], mType = 'S', sigPad;

    window.onload = () => {
        _db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const saved = localStorage.getItem('rk_user');
        if(saved) {
            user = JSON.parse(saved);
            document.getElementById('loginView').style.display = 'none';
            document.getElementById('listView').classList.add('active-view');
            loadProtocols();
        }
        sigPad = new SignaturePad(document.getElementById('sig-rtw'));
    };

    async function handleLogin() {
        const dn = document.getElementById('login_dn').value.trim();
        const pw = document.getElementById('login_pw').value.trim();
        const { data, error } = await _db.from('profiles').select('*').eq('dienstnummer', dn).single();
        if(data && data.passwort === pw) {
            localStorage.setItem('rk_user', JSON.stringify(data));
            location.reload();
        } else {
            document.getElementById('loginError').innerText = "Zugangsdaten falsch!";
        }
    }

    function showFlowSelect() { hideAll(); document.getElementById('flowSelect').classList.add('active-view'); }
    function startFlow(t) { hideAll(); document.getElementById('mainAppRTW').classList.add('active-view'); }
    function showList() { hideAll(); document.getElementById('listView').classList.add('active-view'); loadProtocols(); }
    function hideAll() { document.querySelectorAll('.active-view').forEach(v => v.classList.remove('active-view')); }

    document.getElementById('bodyImg').onclick = function(e) {
        const rect = this.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width * 100;
        const y = (e.clientY - rect.top) / rect.height * 100;
        markers.push({x, y, label: mType});
        const d = document.createElement('div');
        d.className = `marker m-${mType}`; d.style.left = x + '%'; d.style.top = y + '%'; d.innerText = mType;
        document.getElementById('bodyWrapper').appendChild(d);
    };

    function clearMarkers() { markers = []; document.querySelectorAll('.marker').forEach(m => m.remove()); }

    document.getElementById('rtwForm').onsubmit = async (e) => {
        e.preventDefault();
        const p = { 
            typ: 'RTW', e_nr: document.getElementById('r_e_nr').value, p_name: document.getElementById('r_p_name').value, 
            daten: { bericht: document.getElementById('r_bericht').value, markers: markers },
            erstellt_von: user.dienstnummer 
        };
        await _db.from('rd_berichte').insert([p]);
        await fetch(DISCORD, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ content: `🚨 NEU: ${p.e_nr} von ${user.dienstnummer}` })});
        alert("PROTOKOLL ÜBERMITTELT!"); location.reload();
    };

    async function loadProtocols() {
        const { data } = await _db.from('rd_berichte').select('*').order('created_at', {ascending: false});
        if(data) document.getElementById('protocolTableBody').innerHTML = data.map(p => `<tr><td><b>${p.e_nr}</b></td><td>${new Date(p.created_at).toLocaleDateString()}</td><td>${p.typ}</td></tr>`).join('');
    }
</script>
</body>
</html>
