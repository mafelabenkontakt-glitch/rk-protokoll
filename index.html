<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RK ePCR SYSTEM</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
:root { --rk:#e2001a; --rk-dark:#b30014; }

body { margin:0; font-family:Segoe UI; background:#f4f7f6; }

/* LOGIN */
#loginView {
    position:fixed; inset:0;
    display:flex; justify-content:center; align-items:center;
    background:linear-gradient(135deg,var(--rk),var(--rk-dark));
}

.login-card {
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    width:90%;
    max-width:400px;
}

/* HEADER */
.header {
    background:white;
    padding:15px;
    border-bottom:5px solid var(--rk);
    display:flex;
    justify-content:space-between;
}

/* CARD */
.card {
    background:white;
    margin:15px;
    padding:15px;
    border-radius:15px;
}

.section {
    background:#2c3e50;
    color:white;
    padding:10px;
    margin:20px 15px 5px;
    border-left:8px solid var(--rk);
}

.btn {
    background:var(--rk);
    color:white;
    border:none;
    padding:12px;
    border-radius:10px;
    width:100%;
    font-weight:bold;
}

.hidden { display:none; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginView">
    <div class="login-card">
        <h2 style="color:#e2001a;">RK LOGIN</h2>
        <input id="dn" placeholder="Dienstnummer"><br><br>
        <input id="pw" type="password" placeholder="Passwort"><br><br>
        <button class="btn" onclick="login()">LOGIN</button>
        <div id="err" style="color:red;margin-top:10px;"></div>
    </div>
</div>

<!-- LIST -->
<div id="listView" class="hidden">
    <div class="header">
        <b>🚑 Einsätze</b>
        <button onclick="newEntry()">➕</button>
    </div>
    <div id="list"></div>
</div>

<!-- FORM -->
<div id="formView" class="hidden">

<div class="header">
    <button onclick="back()">←</button>
    <b>Protokoll</b>
</div>

<div class="section">EINSATZ</div>
<div class="card">
    <input id="e_nr" placeholder="Einsatznummer">
    <input id="p_name" placeholder="Patient">
</div>

<div class="section">ABCDE</div>
<div class="card">
    <input id="a" placeholder="A">
    <input id="b" placeholder="B">
    <input id="c" placeholder="C">
    <input id="d" placeholder="D">
    <input id="e" placeholder="E">
</div>

<div class="section">BERICHT</div>
<div class="card">
    <textarea id="bericht"></textarea>
</div>

<button class="btn" onclick="save()">SPEICHERN</button>

</div>

<script>

// ✅ DEINE ECHTEN KEYS
const SUPABASE_URL = "https://rnfbggoetkmgxqdvznrm.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJuZmJnZ29ldGttZ3hxZHZ6bnJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2ODc5OTAsImV4cCI6MjA5MDI2Mzk5MH0.WIkTaULzTAGgmWEdZ1au35ae826joFGVHP--E-2fsSg";

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let user = null;

// 🔐 LOGIN FIX
async function login(){
    err.innerText = "prüfe...";

    const { data, error } = await db
        .from("profiles")
        .select("*")
        .eq("dienstnummer", dn.value)
        .single();

    if(error){
        err.innerText = "User nicht gefunden!";
        console.log(error);
        return;
    }

    if(data.passwort !== pw.value){
        err.innerText = "Passwort falsch!";
        return;
    }

    user = data;

    loginView.classList.add("hidden");
    listView.classList.remove("hidden");

    load();
}

// 📥 LADEN
async function load(){
    const { data } = await db
        .from("rd_berichte")
        .select("*")
        .order("created_at",{ascending:false});

    list.innerHTML = data.map(d=>`
        <div class="card" onclick='openEntry(${JSON.stringify(d)})'>
            <b>${d.e_nr}</b><br>
            ${d.p_name}
        </div>
    `).join("");
}

// ➕ NEU
function newEntry(){
    formView.classList.remove("hidden");
}

// 🔙 ZURÜCK
function back(){
    formView.classList.add("hidden");
}

// 🔍 OPEN
function openEntry(d){
    formView.classList.remove("hidden");

    e_nr.value = d.e_nr;
    p_name.value = d.p_name;

    a.value = d.daten.abcde.a;
    b.value = d.daten.abcde.b;
    c.value = d.daten.abcde.c;
    d.value = d.daten.abcde.d;
    e.value = d.daten.abcde.e;

    bericht.value = d.daten.bericht;
}

// 💾 SAVE
async function save(){

    if(!e_nr.value){
        alert("Einsatznummer fehlt!");
        return;
    }

    const entry = {
        e_nr: e_nr.value,
        p_name: p_name.value,
        daten:{
            abcde:{
                a:a.value,
                b:b.value,
                c:c.value,
                d:d.value,
                e:e.value
            },
            bericht:bericht.value
        },
        erstellt_von: user.dienstnummer
    };

    const { error } = await db.from("rd_berichte").insert([entry]);

    if(error){
        alert("Fehler beim Speichern!");
        console.log(error);
        return;
    }

    alert("Gespeichert!");
    formView.classList.add("hidden");
    load();
}

</script>

</body>
</html>
