<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RK CLOUD OS | FIX V15</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.5/dist/signature_pad.umd.min.js"></script>

    <style>
        :root { --rk-red: #e2001a; --rk-dark: #b30014; --rk-grey: #2c3e50; }
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; padding-bottom: 80px; }
        .rk-header { background: linear-gradient(180deg, var(--rk-red) 0%, var(--rk-dark) 100%); color: white; padding: 25px; text-align: center; border-radius: 0 0 30px 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); position: sticky; top: 0; z-index: 1000; }
        .section-header { background: var(--rk-grey); color: white; padding: 15px; font-weight: 900; border-left: 12px solid var(--rk-red); margin: 35px 0 15px 0; border-radius: 8px; text-transform: uppercase; }
        .card-custom { background: white; border-radius: 25px; padding: 30px; margin-bottom: 25px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .body-container { position: relative; width: 100%; max-width: 420px; margin: auto; background: white; border: 3px solid #eee; border-radius: 20px; padding: 10px; }
        .body-img { width: 100%; height: auto; display: block; cursor: crosshair; }
        .marker { position: absolute; width: 36px; height: 36px; border-radius: 50%; color: white; font-weight: bold; display: flex; align-items: center; justify-content: center; transform: translate(-50%, -50%); border: 3px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 100; pointer-events: none; }
        .m-S { background: #fd7e14; } .m-F { background: #0d6efd; } .m-W { background: #dc3545; }
        .vital-input { font-size: 1.2rem; font-weight: 800; text-align: center; color: var(--rk-red); }
        #mainAppRTW, #mainAppKTW, #listView, #flowSelect, #loginView { display: none; }
        .active-view { display: block !important; }
        .sig-canvas { border: 2px dashed #ccc; width: 100%; height: 220px; background: #fafafa; border-radius: 15px; }
    </style>
</head>
<body>

<div id="loginView" class="active-view">
    <div style="height:100vh; display:flex; align-items:center; justify-content:center; background:var(--rk-red);">
        <div class="card-custom text-center" style="width:400px;">
            <h2 class="fw-bold mb-4">RK SYSTEM LOGIN</h2>
            <input type="text" id="login_dn" class="form-control mb-3 p-3 rounded-pill text-center" placeholder="Dienstnummer">
            <input type="password" id="login_pw" class="form-control mb-4 p-3 rounded-pill text-center" placeholder="Passwort">
            <button onclick="handleLogin()" id="btnLog" class="btn btn-danger w-100 p-3 rounded-pill fw-bold">LOGIN</button>
            <div id="loginError" class="mt-3 text-danger fw-bold"></div>
        </div>
    </div>
</div>

<div id="listView" class="container mt-3">
    <div class="rk-header mb-4">
        <h1 class="fw-bold">JOURNAL</h1>
        <button class="btn btn-light fw-bold px-4 rounded-pill mt-2" onclick="showFlowSelect()">➕ NEU</button>
        <button class="btn btn-sm btn-outline-light ms-2" onclick="logout()">LOGOUT</button>
    </div>
    <div class="card-custom"><table class="table"><tbody id="protocolTableBody"></tbody></table></div>
</div>

<div id="flowSelect" class="container mt-5 text-center">
    <div class="row g-3">
        <div class="col-6"><button class="btn btn-danger w-100 py-5 fs-2 fw-bold" onclick="startFlow('RTW')">🚑 RTW</button></div>
        <div class="col-6"><button class="btn btn-primary w-100 py-5 fs-2 fw-bold" onclick="startFlow('KTW')">🚐 KTW</button></div>
    </div>
</div>

<div id="mainAppRTW" class="container mt-3">
    <div class="rk-header mb-3"><h2>🚑 RTW NOTFALL</h2></div>
    <form id="rtwForm">
        <div class="section-header">1. Einsatzdaten</div>
        <div class="card-custom">
            <div class="row g-2 mb-3">
                <div class="col-4"><label>Alarm</label><input type="time" id="r_t_alarm" class="form-control"></div>
                <div class="col-4"><label>S3</label><input type="time" id="r_t_s3" class="form-control"></div>
                <div class="col-4"><label>S7</label><input type="time" id="r_t_s7" class="form-control"></div>
            </div>
            <input type="text" id="r_e_nr" class="form-control p-3 mb-2" placeholder="Einsatz-Nummer" required>
            <input type="text" id="r_p_name" class="form-control p-3" placeholder="Patientenname">
        </div>

        <div class="section-header">2. Vitalwerte (ABCDE)</div>
        <div class="card-custom">
            <div class="row g-3 mb-2">
                <div class="col-4"><label>AF</label><input type="number" id="r_v_af" class="form-control vital-input"></div>
                <div class="col-4"><label>SpO2</label><input type="number" id="r_v_sp" class="form-control vital-input"></div>
                <div class="col-4"><label>HF</label><input type="number" id="r_v_hf" class="form-control vital-input"></div>
            </div>
            <div class="row g-3">
                <div class="col-4"><label>RR Sys</label><input type="number" id="r_v_rrs" class="form-control vital-input"></div>
                <div class="col-4"><label>RR Dia</label><input type="number" id="r_v_rrd" class="form-control vital-input"></div>
                <div class="col-4"><label>BZ</label><input type="number" id="r_v_bz" class="form-control vital-input"></div>
            </div>
        </div>

        <div class="section-header">3. SAMPLER & OPQRST</div>
        <div class="card-custom">
            <input type="text" id="r_s_s" class="form-control mb-2" placeholder="S - Symptome">
            <input type="text" id="r_s_a" class="form-control mb-2" placeholder="A - Allergien">
            <input type="text" id="r_s_m" class="form-control mb-2" placeholder="M - Medikamente">
            <input type="text" id="r_s_p" class="form-control mb-4" placeholder="P - Patientenanamnese">
            <hr>
            <input type="text" id="r_o_o" class="form-control mb-2" placeholder="O - Onset">
            <input type="text" id="r_o_q" class="form-control mb-2" placeholder="Q - Qualität">
            <input type="number" id="r_o_s" class="form-control" placeholder="S - Stärke (1-10)">
        </div>

        <div class="section-header">4. Bodygramm</div>
        <div class="card-custom text-center">
            <div class="body-container" id="bodyWrapper">
                <img src="grafik.png" id="bodyImg" class="body-img" alt="Body">
            </div>
            <div class="btn-group w-100 mt-3">
                <button type="button" class="btn btn-warning" onclick="mType='S'">S</button>
                <button type="button" class="btn btn-primary" onclick="mType='F'">F</button>
                <button type="button" class="btn btn-danger" onclick="mType='W'">W</button>
            </div>
        </div>

        <div class="section-header">5. Bericht & Signatur</div>
        <div class="card-custom">
            <textarea id="r_bericht" class="form-control mb-4" rows="10" placeholder="Maßnahmen & Verlauf..."></textarea>
            <canvas id="sig-rtw" class="sig-canvas mb-3"></canvas>
            <button type="submit" class="btn btn-danger w-100 py-4 fw-bold shadow-lg">ABSCHICKEN</button>
        </div>
    </form>
</div>

<script>
    const SUPABASE_URL = 'https://rnfbggoetkmgxqdvznrm.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJuZmJnZ29ldGttZ3hxZHZ6bnJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2ODc5OTAsImV4cCI6MjA5MDI2Mzk5MH0.WIkTaULzTAGgmWEdZ1au35ae826joFGVHP--E-2fsSg';
    const DISCORD = 'https://discord.com/api/webhooks/1487187005485093155/BrI0fLWg7rhSLDnRJBzM5oxyhl0vGIoBs7HHGsbrsgFhXmY-RlS8TLKrBAH7MyJpVzQT';

    let _db, user = null, markers = [], mType = 'S', sigPad;

    window.onload = () => {
        _db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const saved = localStorage.getItem('rk_user');
        if(saved) {
            user = JSON.parse(saved);
            hideAll();
            document.getElementById('listView').classList.add('active-view');
            loadProtocols();
        }
        sigPad = new SignaturePad(document.getElementById('sig-rtw'));
    };

    async function handleLogin() {
        const dn = document.getElementById('login_dn').value.trim();
        const pw = document.getElementById('login_pw').value.trim();
        const errDiv = document.getElementById('loginError');
        
        errDiv.innerText = "Prüfe...";

        try {
            const { data, error } = await _db.from('profiles').select('*').eq('dienstnummer', dn);
            
            if (error) throw error;

            if (data && data.length > 0) {
                const dbUser = data[0];
                if (dbUser.passwort === pw) {
                    localStorage.setItem('rk_user', JSON.stringify(dbUser));
                    location.reload();
                } else {
                    errDiv.innerText = "Passwort falsch!";
                }
            } else {
                errDiv.innerText = "Dienstnummer unbekannt!";
            }
        } catch (e) {
            errDiv.innerText = "Fehler: " + e.message;
        }
    }

    function showFlowSelect() { hideAll(); document.getElementById('flowSelect').classList.add('active-view'); }
    function startFlow(t) { hideAll(); document.getElementById('mainAppRTW').classList.add('active-view'); }
    function hideAll() { 
        document.getElementById('loginView').classList.remove('active-view');
        document.getElementById('listView').classList.remove('active-view');
        document.getElementById('flowSelect').classList.remove('active-view');
        document.getElementById('mainAppRTW').classList.remove('active-view');
    }
    function logout() { localStorage.removeItem('rk_user'); location.reload(); }

    document.getElementById('bodyImg').onclick = function(e) {
        const rect = this.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width * 100;
        const y = (e.clientY - rect.top) / rect.height * 100;
        markers.push({x, y, label: mType});
        const d = document.createElement('div');
        d.className = `marker m-${mType}`; d.style.left = x + '%'; d.style.top = y + '%'; d.innerText = mType;
        document.getElementById('bodyWrapper').appendChild(d);
    };

    document.getElementById('rtwForm').onsubmit = async (e) => {
        e.preventDefault();
        const p = { 
            typ: 'RTW', e_nr: document.getElementById('r_e_nr').value, 
            p_name: document.getElementById('r_p_name').value, 
            daten: { bericht: document.getElementById('r_bericht').value, markers: markers },
            erstellt_von: user.dienstnummer 
        };
        await _db.from('rd_berichte').insert([p]);
        await fetch(DISCORD, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ content: `🚨 EINSATZ: ${p.e_nr} (${user.dienstnummer})` })});
        alert("ÜBERMITTELT!"); location.reload();
    };

    async function loadProtocols() {
        const { data } = await _db.from('rd_berichte').select('*').order('created_at', {ascending: false}).limit(10);
        if(data) document.getElementById('protocolTableBody').innerHTML = data.map(p => `<tr><td><b>${p.e_nr}</b></td><td>${p.typ}</td></tr>`).join('');
    }
</script>
</body>
</html>
