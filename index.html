<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RK Cloud OS | ULTRA MAXIMAL V7.4</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --rk-red: #e2001a; --rk-dark: #b30014; --rk-blue: #0056b3; --rk-grey: #2c3e50; }
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; padding-bottom: 80px; }
        #loginView { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, var(--rk-red) 0%, #8b0000 100%); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .login-card { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.4); width: 90%; max-width: 420px; text-align: center; }
        .header-rk { background: var(--rk-red); color: white; padding: 20px; text-align: center; border-bottom: 6px solid var(--rk-dark); box-shadow: 0 4px 15px rgba(0,0,0,0.3); margin-bottom: 25px; position: sticky; top: 0; z-index: 1000; }
        .section-title { background: var(--rk-grey); color: white; padding: 12px; font-weight: bold; border-left: 8px solid var(--rk-red); margin: 30px 0 15px 0; border-radius: 5px; text-transform: uppercase; }
        .card { border: none; border-radius: 15px; box-shadow: 0 6px 18px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .abcde-card { border-left: 5px solid var(--rk-red); padding: 15px; margin-bottom: 15px; background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .abcde-label { color: var(--rk-red); font-weight: bold; font-size: 1.1rem; margin-bottom: 10px; display: block; }
        .bodygramm-container { position: relative; width: 320px; margin: 15px auto; background: white; border: 2px solid #ddd; border-radius: 12px; padding: 10px; }
        .body-img { width: 100%; height: auto; cursor: crosshair; }
        .marker { position: absolute; width: 28px; height: 28px; border-radius: 50%; color: white; font-size: 13px; font-weight: bold; display: flex; align-items: center; justify-content: center; transform: translate(-50%, -50%); border: 2px solid white; pointer-events: none; }
        .m-pain { background: #fd7e14; } .m-bone { background: #0d6efd; } .m-wound { background: #dc3545; }
        .sig-canvas { border: 2px dashed #bbb; background: #fff; width: 100%; height: 200px; border-radius: 12px; touch-action: none; }
        .btn-rk { background: var(--rk-red); color: white; font-weight: bold; border: none; padding: 18px; transition: 0.3s; border-radius: 10px; }
        #mainAppRTW, #listView, #detailView { display: none; }
        .active-view { display: block !important; }
        .med-item { background: #e9ecef; padding: 10px; border-radius: 8px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; border-left: 4px solid var(--rk-blue); }
    </style>
</head>
<body>

<div id="loginView">
    <div class="login-card">
        <h2 class="fw-bold mb-1" style="color: var(--rk-red)">RK CLOUD 7.4</h2>
        <input type="text" id="login_dn" class="form-control mb-3 p-3" placeholder="RK-02 (Dienstnummer)">
        <input type="password" id="login_pw" class="form-control mb-4 p-3" placeholder="Passwort">
        <button onclick="login()" class="btn btn-rk w-100">LOGIN</button>
        <p id="loginStatus" class="mt-3 text-danger fw-bold small"></p>
    </div>
</div>

<div id="listView" class="container mt-4">
    <div class="header-rk rounded-4">
        <h3 id="welcomeMsg">EINSATZÜBERSICHT</h3>
        <button class="btn btn-light fw-bold mt-2" onclick="startFlow()">➕ NEUER EINSATZ</button>
        <button class="btn btn-outline-light btn-sm mt-2" onclick="logout()">LOGOUT</button>
    </div>
    <div class="card p-4 shadow-sm">
        <h5 class="fw-bold border-bottom pb-2">Berichtsarchiv</h5>
        <div class="table-responsive"><table class="table table-hover align-middle">
            <thead><tr><th>E-Nr</th><th>Patient</th><th>Datum</th><th>Aktion</th></tr></thead>
            <tbody id="protocolTableBody" style="cursor: pointer;"></tbody>
        </table></div>
    </div>
</div>

<div id="detailView" class="container mt-3">
    <div class="header-rk rounded-4">
        <button class="btn btn-sm btn-light float-start" onclick="showList()">⬅ ZURÜCK</button>
        <h3>PROTOKOLL DETAILS</h3>
    </div>
    <div id="detailContent" class="card p-4 shadow-sm bg-white"></div>
</div>

<div id="mainAppRTW" class="container mt-3">
    <div class="header-rk rounded-4">
        <button class="btn btn-sm btn-light float-start" onclick="showList()">⬅ ABBRUCH</button>
        <h3>🚑 RTW NOTFALLPROTOKOLL</h3>
    </div>

    <form id="rtwForm">
        <div class="section-title">1. Einsatzdaten & Zeiten (S1-S7)</div>
        <div class="card p-3">
            <div class="row g-2 mb-3">
                <div class="col-4"><label class="small fw-bold">Alarm</label><input type="time" id="t_alarm" class="form-control"></div>
                <div class="col-4"><label class="small fw-bold">S2 (Ausr.)</label><input type="time" id="t_s2" class="form-control"></div>
                <div class="col-4"><label class="small fw-bold">S3 (Ankunft)</label><input type="time" id="t_s3" class="form-control"></div>
                <div class="col-4"><label class="small fw-bold">S4 (Abfahrt)</label><input type="time" id="t_s4" class="form-control"></div>
                <div class="col-4"><label class="small fw-bold">S7 (Ziel)</label><input type="time" id="t_s7" class="form-control"></div>
                <div class="col-4"><label class="small fw-bold">S1 (Bereit)</label><input type="time" id="t_s1" class="form-control"></div>
            </div>
            <div class="row g-3">
                <div class="col-md-4"><label class="fw-bold">Einsatz-Nr</label><input type="text" id="r_e_nr" class="form-control" required></div>
                <div class="col-md-4"><label class="fw-bold">Fahrzeug</label><input type="text" id="r_fz" class="form-control"></div>
                <div class="col-md-4"><label class="fw-bold">Team</label><input type="text" id="r_team" class="form-control"></div>
            </div>
        </div>

        <div class="section-title">2. Patient & Bodygramm</div>
        <div class="card p-3">
            <input type="text" id="r_p_name" class="form-control mb-2" placeholder="Patientenname / Unbekannt">
            <div class="row g-2 mb-3">
                <div class="col-6"><input type="date" id="r_p_geb" class="form-control"></div>
                <div class="col-6"><input type="text" id="r_p_adr" class="form-control" placeholder="Adresse"></div>
            </div>
            <div class="bodygramm-container" id="bodyWrapper">
                <img src="https://i.imgur.com/uX8Zf0M.png" id="bodyImg" class="body-img" alt="[Bodygramm]">
            </div>
            <button type="button" class="btn btn-outline-danger btn-sm w-100" onclick="clearMarkers()">Marker löschen</button>
        </div>

        <div class="section-title">4. BEFUND (ABCDE + AVPU + FREITEXT)</div>
        
        <div class="abcde-card">
            <label class="abcde-label">A - AIRWAY</label>
            <div class="d-flex gap-3 mb-2">
                <select id="r_a_stat" class="form-select w-50"><option>Frei</option><option>Gefährdet</option><option>Verlegt</option></select>
                <div class="form-check pt-1"><input class="form-check-input" type="checkbox" id="r_a_hws"><label class="form-check-label small">HWS fixiert</label></div>
            </div>
            <textarea id="r_a_text" class="form-control" rows="2" placeholder="Zusätzliche Notizen zu A..."></textarea>
        </div>

        <div class="abcde-card">
            <label class="abcde-label">B - BREATHING</label>
            <div class="row g-2 mb-2">
                <div class="col-4"><input type="text" id="r_v_af" class="form-control" placeholder="AF"></div>
                <div class="col-4"><input type="text" id="r_v_sp" class="form-control" placeholder="SpO2"></div>
                <div class="col-4"><select id="r_b_ausk" class="form-select"><option>Ausk: o.B.</option><option>Giemen</option><option>Rasseln</option></select></div>
            </div>
            <textarea id="r_b_text" class="form-control" rows="2" placeholder="Zusätzliche Notizen zu B..."></textarea>
        </div>

        <div class="abcde-card">
            <label class="abcde-label">C - CIRCULATION</label>
            <div class="row g-2 mb-2">
                <div class="col-3"><input type="text" id="r_v_hf" class="form-control" placeholder="HF"></div>
                <div class="col-3"><input type="text" id="r_v_rr" class="form-control" placeholder="RR"></div>
                <div class="col-3"><select id="r_c_rekap" class="form-select"><option>Rekap < 2s</option><option>Rekap > 2s</option></select></div>
                <div class="col-3"><select id="r_c_haut" class="form-select"><option>rosig/warm</option><option>blass/kalt</option><option>schweißig</option></select></div>
            </div>
            <textarea id="r_c_text" class="form-control" rows="2" placeholder="Zusätzliche Notizen zu C..."></textarea>
        </div>

        <div class="abcde-card">
            <label class="abcde-label">D - DISABILITY (Neurologie)</label>
            <div class="row g-2 mb-2">
                <div class="col-6"><label class="small fw-bold">AVPU</label><select id="r_v_avpu" class="form-select"><option>A (Alert - Wach, orientiert)</option><option>V (Voice - Ansprache)</option><option>P (Pain - Schmerzreiz)</option><option>U (Unresponsive)</option></select></div>
                <div class="col-3"><label class="small fw-bold">BZ [MG/DL]</label><input type="text" id="r_v_bz" class="form-control"></div>
                <div class="col-3"><label class="small fw-bold">PUPILLEN</label><select id="r_v_pup" class="form-select"><option>isokor</option><option>anisokor</option><option>weit</option><option>eng</option></select></div>
            </div>
            <div class="form-check form-switch mb-2"><input class="form-check-input" type="checkbox" id="r_d_fast"><label class="form-check-label small">FAST-Schema positiv?</label></div>
            <textarea id="r_d_text" class="form-control" rows="2" placeholder="Zusätzliche Notizen zu D..."></textarea>
        </div>

        <div class="abcde-card">
            <label class="abcde-label">E - EXPOSURE</label>
            <div class="row g-2 mb-2">
                <div class="col-3"><input type="text" id="r_v_temp" class="form-control" placeholder="Temp"></div>
                <div class="col-9"><input type="text" id="r_e_auff" class="form-control" placeholder="Auffälligkeiten Umgebung / PSA"></div>
            </div>
            <textarea id="r_e_text" class="form-control" rows="2" placeholder="Zusätzliche Notizen zu E..."></textarea>
        </div>

        <div class="section-title">5. ANAMNESE (SAMPLER)</div>
        <div class="card p-3">
            <input type="text" id="s_s" class="form-control mb-1" placeholder="Symptome">
            <input type="text" id="s_a" class="form-control mb-1" placeholder="Allergien">
            <input type="text" id="s_m" class="form-control mb-1" placeholder="Medikamente">
            <input type="text" id="s_p" class="form-control mb-1" placeholder="Patientengeschichte">
            <input type="text" id="s_l" class="form-control mb-1" placeholder="Letzte Mahlzeit">
            <input type="text" id="s_e" class="form-control" placeholder="Ereignis">
        </div>

        <div class="section-title">6. Maßnahmen & Verlauf</div>
        <div class="card p-3">
            <div class="d-flex gap-2 mb-3">
                <select id="medSelect" class="form-select">
                    <option value="">-- Medikament wählen --</option>
                    <option>Adrenalin</option><option>Amiodaron</option><option>Aspisol</option><option>Atropin</option><option>Beloc</option><option>Berodual</option><option>Buscopan</option><option>Dormicum</option><option>Fentanyl</option><option>Glucose 20%</option><option>Morphin</option><option>Naloxon</option><option>Novalgin</option><option>Nitro-Spray</option><option>Paspertin</option><option>Propofol</option><option>Vomex</option>
                </select>
                <button type="button" class="btn btn-primary" onclick="addMed()">➕</button>
            </div>
            <div id="medList"></div>
            <hr>
            <textarea id="r_text" class="form-control mb-3" rows="8" placeholder="Maßnahmen / Verlauf / Bericht..."></textarea>
            <label class="fw-bold">Unterschrift:</label>
            <canvas id="sig-rtw" class="sig-canvas"></canvas>
            <button type="button" class="btn btn-sm btn-link text-danger" onclick="sigRtw.clear()">Löschen</button>
        </div>

        <button type="submit" class="btn btn-rk w-100 py-4 mb-5 shadow-lg fs-2">🚨 BERICHT ABSENDEN</button>
    </form>
</div>

<div class="modal fade" id="markerModal" tabindex="-1"><div class="modal-dialog modal-sm modal-dialog-centered"><div class="modal-content p-3 text-center">
    <button onclick="place('S','m-pain')" class="btn btn-warning w-100 mb-2">🔥 Schmerz</button>
    <button onclick="place('F','m-bone')" class="btn btn-primary w-100 mb-2">🦴 Fraktur</button>
    <button onclick="place('W','m-wound')" class="btn btn-danger w-100">🩸 Wunde</button>
</div></div></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.5/dist/signature_pad.umd.min.js"></script>
<script>
    const SUPABASE_URL = 'https://rnfbggoetkmgxqdvznrm.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJuZmJnZ29ldGttZ3hxZHZ6bnJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2ODc5OTAsImV4cCI6MjA5MDI2Mzk5MH0.WIkTaULzTAGgmWEdZ1au35ae826joFGVHP--E-2fsSg';
    const DISCORD_WEBHOOK_URL = 'https://discord.com/api/webhooks/1487187005485093155/BrI0fLWg7rhSLDnRJBzM5oxyhl0vGIoBs7HHGsbrsgFhXmY-RlS8TLKrBAH7MyJpVzQT';

    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let currentUser = null, markers = [], selectedMeds = [], curX, curY;
    const modal = new bootstrap.Modal(document.getElementById('markerModal'));
    const sigRtw = new SignaturePad(document.getElementById('sig-rtw'));

    window.onload = () => {
        const saved = localStorage.getItem('rk_user');
        if(saved) { currentUser = JSON.parse(saved); document.getElementById('loginView').style.display = 'none'; document.getElementById('listView').classList.add('active-view'); loadProtocols(); }
    };

    async function login() {
        const dn = document.getElementById('login_dn').value, pw = document.getElementById('login_pw').value;
        const { data } = await _supabase.from('profiles').select('*').eq('dienstnummer', dn).eq('passwort', pw).single();
        if (data) { localStorage.setItem('rk_user', JSON.stringify(data)); location.reload(); }
        else { document.getElementById('loginStatus').innerText = "Login ungültig!"; }
    }

    function logout() { localStorage.removeItem('rk_user'); location.reload(); }
    function startFlow() { document.getElementById('listView').classList.remove('active-view'); document.getElementById('mainAppRTW').classList.add('active-view'); }
    function showList() { location.reload(); }

    async function loadProtocols() {
        const { data } = await _supabase.from('rd_berichte').select('*').order('created_at', {ascending: false});
        const hasPower = currentUser.is_admin === true || currentUser.is_admin === 1 || currentUser.rolle === 'leitung';
        if(data) {
            document.getElementById('protocolTableBody').innerHTML = data.map(p => `
                <tr onclick="openProtocol(${p.id})">
                    <td><b>${p.e_nr}</b></td>
                    <td>${p.p_name}</td>
                    <td>${new Date(p.created_at).toLocaleDateString()}</td>
                    <td>${hasPower ? `<button class="btn btn-sm btn-danger" onclick="deleteProtocol(event, ${p.id})"><i class="bi bi-trash"></i></button>` : '<i class="bi bi-lock"></i>'}</td>
                </tr>`).join('');
        }
    }

    async function deleteProtocol(e, id) {
        e.stopPropagation();
        if(confirm("Diesen Bericht wirklich löschen?")) { await _supabase.from('rd_berichte').delete().eq('id', id); loadProtocols(); }
    }

    async function openProtocol(id) {
        const { data } = await _supabase.from('rd_berichte').select('*').eq('id', id).single();
        if(data) {
            const d = data.daten;
            let html = `<h4>Einsatz: ${data.e_nr}</h4><hr><p><b>Patient:</b> ${data.p_name}</p>`;
            html += `<p><b>Maßnahmen/Verlauf:</b><br>${d.bericht || 'Kein Text'}</p>`;
            html += `<p><b>Medikamente:</b> ${d.meds?.map(m => m.name).join(', ') || 'Keine'}</p>`;
            document.getElementById('detailContent').innerHTML = html + `<button class="btn btn-dark w-100" onclick="showList()">Schließen</button>`;
            document.getElementById('listView').classList.remove('active-view');
            document.getElementById('detailView').classList.add('active-view');
        }
    }

    function addMed() {
        const m = document.getElementById('medSelect').value;
        if(m) {
            const id = Date.now();
            selectedMeds.push({id: id, name: m});
            document.getElementById('medList').innerHTML += `<div class="med-item"><span>${m}</span><button type="button" class="btn btn-sm btn-danger" onclick="this.parentElement.remove()">✕</button></div>`;
        }
    }

    document.getElementById('bodyImg').onclick = function(e) {
        const rect = this.getBoundingClientRect();
        curX = (e.clientX - rect.left) / rect.width * 100;
        curY = (e.clientY - rect.top) / rect.height * 100;
        modal.show();
    };
    function place(s, c) { markers.push({x: Math.round(curX), y: Math.round(curY)}); const d = document.createElement('div'); d.className = 'marker ' + c; d.style.left = curX + '%'; d.style.top = curY + '%'; d.innerText = s; document.getElementById('bodyWrapper').appendChild(d); modal.hide(); }
    function clearMarkers() { markers = []; document.querySelectorAll('.marker').forEach(m => m.remove()); }

    document.getElementById('rtwForm').onsubmit = async (e) => { 
        e.preventDefault(); 
        const payload = { e_nr: document.getElementById('r_e_nr').value, p_name: document.getElementById('r_p_name').value };
        const data = { 
            abcde: { a: document.getElementById('r_a_text').value, d: { avpu: document.getElementById('r_v_avpu').value } },
            bericht: document.getElementById('r_text').value, 
            meds: selectedMeds,
            zeiten: { alarm: document.getElementById('t_alarm').value, s3: document.getElementById('t_s3').value, s7: document.getElementById('t_s7').value }
        };
        await _supabase.from('rd_berichte').insert([{ e_nr: payload.e_nr, p_name: payload.p_name, daten: data, erstellt_von: currentUser.dienstnummer }]);
        
        // Discord Webhook
        await fetch(DISCORD_WEBHOOK_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({
            embeds: [{ title: `🚨 NEUES PROTOKOLL: ${payload.e_nr}`, color: 14811162, fields: [
                { name: "Patient", value: payload.p_name || "-", inline: true },
                { name: "Sanitäter", value: currentUser.dienstnummer, inline: true },
                { name: "Verlauf", value: document.getElementById('r_text').value.substring(0, 500) }
            ]}]
        })});

        alert("BERICHT ERFOLGREICH GESPEICHERT!"); location.reload();
    };
</script>
</body>
</html>
