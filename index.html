<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RK ePCR PRO</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
:root { --rk:#e2001a; }

body { font-family:Segoe UI; background:#f4f7f6; }
.dark { background:#1e1e1e; color:white; }

.section { display:none; }
.active { display:block; }

.cardx {
    background:white;
    padding:15px;
    border-radius:15px;
    margin-bottom:15px;
}
.dark .cardx { background:#2b2b2b; }

.header {
    display:flex; justify-content:space-between;
    padding:10px;
    border-bottom:3px solid var(--rk);
    background:white;
}
.dark .header { background:#111; }

input, textarea, select {
    margin-bottom:8px !important;
}

canvas {
    border:2px dashed #ccc;
    width:100%;
    height:150px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <b>RK ePCR PRO</b>
    <div>
        <button onclick="toggleDark()" class="btn btn-sm btn-dark">🌙</button>
        <button onclick="newEntry()" class="btn btn-sm btn-danger">NEU</button>
    </div>
</div>

<!-- LIST -->
<div id="list"></div>

<!-- FORM -->
<div id="form" class="section container mt-3">

<h5>Einsatz</h5>
<div class="cardx">
<input id="nr" placeholder="Einsatznummer" class="form-control" required>
<input id="ort" placeholder="Ort" class="form-control">

<b>Zeiten</b>
<input type="time" id="s1" class="form-control" placeholder="Alarm">
<input type="time" id="s3" class="form-control" placeholder="Ausgerückt">
<input type="time" id="s4" class="form-control" placeholder="Ankunft">
<input type="time" id="s7" class="form-control" placeholder="Transport">
<input type="time" id="s8" class="form-control" placeholder="Frei">
</div>

<h5>Patient</h5>
<div class="cardx">
<input id="name" placeholder="Name" class="form-control">
<input id="age" type="number" placeholder="Alter" class="form-control">
<select id="gender" class="form-control">
<option>M</option><option>W</option><option>D</option>
</select>
</div>

<h5>NACA</h5>
<div class="cardx">
<select id="naca" class="form-control">
<option>0 - kein Befund</option>
<option>1 - leicht</option>
<option>2 - mäßig</option>
<option>3 - ernst</option>
<option>4 - schwer</option>
<option>5 - akut lebensbedrohlich</option>
<option>6 - reanimation</option>
<option>7 - tot</option>
</select>
</div>

<h5>ABCDE</h5>
<div class="cardx">
<input id="a" placeholder="Airway" class="form-control" required>

<input id="af" type="number" placeholder="AF" class="form-control">
<input id="spo2" type="number" placeholder="SpO2" class="form-control">

<input id="rr" placeholder="RR" class="form-control">
<input id="hf" type="number" placeholder="HF" class="form-control">

<input id="gcs" type="number" placeholder="GCS" class="form-control" required>
</div>

<h5>SAMPLER</h5>
<div class="cardx">
<input id="sampler" placeholder="Kurzsammler" class="form-control">
</div>

<h5>OPQRST</h5>
<div class="cardx">
<input id="opqrst" placeholder="Schmerzbeschreibung" class="form-control">
</div>

<h5>Maßnahmen</h5>
<div class="cardx">
<textarea id="mass" class="form-control" placeholder="Maßnahmen"></textarea>
</div>

<h5>Bericht</h5>
<div class="cardx">
<textarea id="bericht" class="form-control" rows="5"></textarea>
</div>

<h5>Signatur</h5>
<div class="cardx">
<canvas id="sig"></canvas>
<button onclick="clearSig()" class="btn btn-sm btn-secondary mt-2">Reset</button>
</div>

<button onclick="save()" class="btn btn-danger w-100">SPEICHERN</button>

</div>

<script>

let entries = JSON.parse(localStorage.getItem("rk")) || [];

function render(){
    document.getElementById("list").innerHTML = entries.map(e=>`
        <div class="cardx">
            <b>${e.nr}</b><br>
            ${e.ort}<br>
            <small>${e.time}</small>
        </div>
    `).join("");
}

function newEntry(){
    document.getElementById("form").classList.add("active");
}

function save(){

    if(!nr.value || !a.value || !gcs.value){
        alert("Pflichtfelder fehlen!");
        return;
    }

    const e = {
        nr:nr.value,
        ort:ort.value,
        naca:naca.value,
        abcde:{a:a.value,gcs:gcs.value},
        time:new Date().toLocaleString()
    };

    entries.push(e);
    localStorage.setItem("rk", JSON.stringify(entries));

    document.getElementById("form").classList.remove("active");
    render();
}

function toggleDark(){
    document.body.classList.toggle("dark");
}

render();

/* SIGNATURE */
let canvas = document.getElementById("sig");
let ctx = canvas.getContext("2d");
let draw=false;

canvas.onmousedown=()=>draw=true;
canvas.onmouseup=()=>draw=false;
canvas.onmousemove=e=>{
    if(!draw) return;
    ctx.fillRect(e.offsetX,e.offsetY,2,2);
};

function clearSig(){ ctx.clearRect(0,0,canvas.width,canvas.height); }

</script>

</body>
</html>
