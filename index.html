<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RK Cloud OS | Professional Max</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --rk-red: #e2001a; --rk-dark: #b30014; --rk-blue: #0056b3; }
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; padding-bottom: 50px; }
        .header-rk { background: var(--rk-red); color: white; padding: 20px; text-align: center; border-bottom: 6px solid var(--rk-dark); box-shadow: 0 4px 15px rgba(0,0,0,0.3); margin-bottom: 25px; }
        .section-title { background: #2c3e50; color: white; padding: 12px; font-weight: bold; border-left: 8px solid var(--rk-red); margin: 25px 0 15px 0; border-radius: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .card { border: none; border-radius: 15px; box-shadow: 0 6px 18px rgba(0,0,0,0.1); margin-bottom: 20px; border: 1px solid #eee; }
        .form-label { font-weight: 700; color: #333; margin-bottom: 5px; font-size: 0.9rem; }
        .input-group-text { font-weight: bold; background: #f8f9fa; min-width: 45px; justify-content: center; }
        .bodygramm-container { position: relative; width: 320px; margin: 15px auto; background: white; border: 2px solid #ddd; border-radius: 12px; padding: 10px; }
        .body-img { width: 100%; height: auto; cursor: crosshair; }
        .marker { position: absolute; width: 26px; height: 26px; border-radius: 50%; color: white; font-size: 12px; font-weight: bold; display: flex; align-items: center; justify-content: center; transform: translate(-50%, -50%); border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.3); pointer-events: none; }
        .m-pain { background: #fd7e14; } .m-bone { background: #0d6efd; } .m-wound { background: #dc3545; }
        .sig-canvas { border: 2px dashed #bbb; background: #fff; width: 100%; height: 180px; border-radius: 10px; touch-action: none; }
        #mainAppRTW, #mainAppKTW, #listView { display: none; }
        .active-view { display: block !important; }
        .btn-rk { background: var(--rk-red); color: white; border: none; font-weight: bold; padding: 12px; transition: 0.3s; text-transform: uppercase; }
        .btn-rk:hover { background: var(--rk-dark); transform: translateY(-2px); }
        .vital-row { background: #f9f9f9; padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid #ccc; }
    </style>
</head>
<body>

<svg style="display:none;">
  <symbol id="rk-logo" viewBox="0 0 100 100">
    <rect width="100" height="100" fill="white" rx="15"/>
    <path d="M 40 10 h 20 v 30 h 30 v 20 h -30 v 30 h -20 v -30 h -30 v -20 h 30 z" fill="#e2001a"/>
  </symbol>
</svg>

<div id="listView" class="container mt-4 active-view text-center">
    <div class="header-rk rounded-4">
        <svg width="60" height="60" class="mb-2"><use href="#rk-logo"></use></svg>
        <h2>EINSATZ-DASHBOARD</h2>
        <button class="btn btn-light fw-bold mt-2 shadow-sm" onclick="document.getElementById('typeChoice').style.display='flex'">➕ NEUER BERICHT</button>
    </div>
    
    <div id="typeChoice" class="row g-3 mb-4" style="display:none;">
        <div class="col-md-6"><button class="btn btn-rk w-100 py-5 fs-4 shadow" onclick="startFlow('RTW')">🚑 RTW NOTFALL</button></div>
        <div class="col-md-6"><button class="btn btn-primary w-100 py-5 fs-4 shadow" style="background:var(--rk-blue)" onclick="alert('KTW-Modus in Arbeit')">🚐 KTW TRANSPORT</button></div>
    </div>

    <div class="card p-4 text-start">
        <h5 class="fw-bold border-bottom pb-2">Letzte Protokolle</h5>
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead><tr><th>Typ</th><th>E-Nr</th><th>Patient</th><th>Datum</th></tr></thead>
                <tbody id="protocolTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="mainAppRTW" class="container mt-3">
    <div class="header-rk rounded-4">
        <button class="btn btn-sm btn-light float-start" onclick="location.reload()">⬅</button>
        <h3 class="mb-0">🚑 NOTFALLPROTOKOLL (MAXIMAL)</h3>
    </div>

    <form id="rtwForm">
        <div class="section-title">1. Stammdaten</div>
        <div class="card p-3">
            <div class="row g-3">
                <div class="col-md-4"><label class="form-label">Einsatz-Nr.</label><input type="text" id="r_e_nr" class="form-control" required></div>
                <div class="col-md-4"><label class="form-label">Funkrufname</label><input type="text" id="r_fz" class="form-control"></div>
                <div class="col-md-4"><label class="form-label">Team</label><input type="text" id="r_team" class="form-control"></div>
                <div class="col-md-6"><label class="form-label">Alarmzeit</label><input type="time" id="r_t_alarm" class="form-control"></div>
                <div class="col-md-6"><label class="form-label">Ankunft Ort</label><input type="time" id="r_t_ankunft" class="form-control"></div>
            </div>
        </div>

        <div class="section-title">2. Patient</div>
        <div class="card p-3">
            <div class="row g-3">
                <div class="col-md-8"><label class="form-label">Name</label><input type="text" id="r_p_name" class="form-control"></div>
                <div class="col-md-4"><label class="form-label">Geburtsdatum</label><input type="date" id="r_p_geb" class="form-control"></div>
                <div class="col-md-6"><label class="form-label">SV-Nummer</label><input type="text" id="r_p_sv" class="form-control"></div>
                <div class="col-md-6"><label class="form-label">Adresse</label><input type="text" id="r_p_adr" class="form-control"></div>
            </div>
        </div>

        <div class="section-title text-center">3. Bodygramm</div>
        <div class="card p-3 text-center">
            <div class="bodygramm-container" id="bodyWrapper">
                <img src="grafik.png" id="bodyImg" class="body-img" alt="grafik.png fehlt!">
            </div>
            <button type="button" class="btn btn-outline-danger btn-sm mt-2" onclick="clearMarkers()">Marker löschen</button>
        </div>

        <div class="section-title">4. ABCDE Erhebung</div>
        <div class="card p-3">
            <div class="vital-row">
                <label class="text-danger fw-bold">A - AIRWAY</label>
                <div class="row g-2 mt-1">
                    <div class="col-md-6"><select id="r_abc_a" class="form-select"><option>Frei</option><option>Gefährdet</option><option>Verlegt</option></select></div>
                    <div class="col-md-6 d-flex align-items-center"><input type="checkbox" id="r_abc_hws" class="form-check-input me-2"> <label>HWS fixiert</label></div>
                </div>
            </div>

            <div class="vital-row">
                <label class="text-danger fw-bold">B - BREATHING</label>
                <div class="row g-3 mt-1">
                    <div class="col-md-4"><div class="input-group"><span class="input-group-text">AF</span><input type="text" id="r_v_af" class="form-control" placeholder="1/min"></div></div>
                    <div class="col-md-4"><div class="input-group"><span class="input-group-text">SpO2</span><input type="text" id="r_v_spo2" class="form-control" placeholder="%"></div></div>
                    <div class="col-md-4"><select id="r_abc_b_ausk" class="form-select"><option>Ausk: o.B.</option><option>Giemen</option><option>Rasseln</option><option>Stridor</option></select></div>
                </div>
            </div>

            <div class="vital-row">
                <label class="text-danger fw-bold">C - CIRCULATION</label>
                <div class="row g-3 mt-1">
                    <div class="col-md-3"><div class="input-group"><span class="input-group-text">HF</span><input type="text" id="r_v_hf" class="form-control"></div></div>
                    <div class="col-md-3"><div class="input-group"><span class="input-group-text">RR</span><input type="text" id="r_v_rr" class="form-control"></div></div>
                    <div class="col-md-3"><select id="r_abc_c_rekap" class="form-select"><option>Rekap < 2s</option><option>Rekap > 2s</option></select></div>
                    <div class="col-md-3"><select id="r_abc_c_haut" class="form-select"><option>Haut: rosig</option><option>Haut: blass</option><option>Haut: zyanotisch</option><option>Haut: schweißig</option></select></div>
                </div>
            </div>

            <div class="vital-row">
                <label class="text-danger fw-bold">D - DISABILITY</label>
                <div class="row g-3 mt-1">
                    <div class="col-md-4"><select id="r_v_avpu" class="form-select"><option>A (Wach)</option><option>V (Ansprache)</option><option>P (Schmerz)</option><option>U (Bewusstlos)</option></select></div>
                    <div class="col-md-4"><div class="input-group"><span class="input-group-text">BZ</span><input type="text" id="r_v_bz" class="form-control" placeholder="mg/dl"></div></div>
                    <div class="col-md-4"><select id="r_v_pup" class="form-select"><option>Pupillen: isokor</option><option>Pupillen: anisokor</option><option>Pupillen: lichtstarr</option></select></div>
                    <div class="col-12"><input type="checkbox" id="r_d_fast" class="form-check-input me-2"> <label class="fw-bold">FAST (Schlaganfall-Zeichen vorhanden)</label></div>
                </div>
            </div>

            <div class="vital-row">
                <label class="text-danger fw-bold">E - EXPOSURE</label>
                <div class="row g-2 mt-1">
                    <div class="col-md-3"><div class="input-group"><span class="input-group-text">Temp</span><input type="text" id="r_v_temp" class="form-control" placeholder="°C"></div></div>
                    <div class="col-md-9"><input type="text" id="r_abc_e_text" class="form-control" placeholder="Sonstiges (Verletzungen, Umgebung, etc.)"></div>
                </div>
            </div>
        </div>

        <div class="section-title">5. Schmerz & Verlauf (OPQRST)</div>
        <div class="card p-3">
            <div class="row g-3">
                <div class="col-12"><div class="input-group"><span class="input-group-text">O</span><input type="text" id="r_op_o" class="form-control" placeholder="Onset (Beginn)"></div></div>
                <div class="col-12"><div class="input-group"><span class="input-group-text">P</span><input type="text" id="r_op_p" class="form-control" placeholder="Provocation (Auslöser/Linderung)"></div></div>
                <div class="col-12"><div class="input-group"><span class="input-group-text">Q</span><input type="text" id="r_op_q" class="form-control" placeholder="Quality (Art des Schmerzes)"></div></div>
                <div class="col-12"><div class="input-group"><span class="input-group-text">R</span><input type="text" id="r_op_r" class="form-control" placeholder="Radiation (Ausstrahlung)"></div></div>
                <div class="col-12"><div class="input-group"><span class="input-group-text">S</span><input type="number" id="r_op_s" class="form-control" placeholder="Severity (Stärke 1-10)"></div></div>
                <div class="col-12"><div class="input-group"><span class="input-group-text">T</span><input type="text" id="r_op_t" class="form-control" placeholder="Time (Verlauf/Dauer)"></div></div>
            </div>
        </div>

        <div class="section-title">6. Anamnese (SAMPLER)</div>
        <div class="card p-3">
            <div class="row g-3">
                <div class="col-12"><div class="input-group"><span class="input-group-text">S</span><input type="text" id="r_sa_s" class="form-control" placeholder="Symptome"></div></div>
                <div class="col-12"><div class="input-group"><span class="input-group-text">A</span><input type="text" id="r_sa_a" class="form-control" placeholder="Allergien"></div></div>
                <div class="col-12"><div class="input-group"><span class="input-group-text">M</span><input type="text" id="r_sa_m" class="form-control" placeholder="Medikamente"></div></div>
                <div class="col-12"><div class="input-group"><span class="input-group-text">P</span><input type="text" id="r_sa_p" class="form-control" placeholder="Patientengeschichte"></div></div>
                <div class="col-12"><div class="input-group"><span class="input-group-text">L</span><input type="text" id="r_sa_l" class="form-control" placeholder="Last Intake (Letzte Mahlzeit)"></div></div>
                <div class="col-12"><div class="input-group"><span class="input-group-text">E</span><input type="text" id="r_sa_e" class="form-control" placeholder="Events (Ereignisse davor)"></div></div>
                <div class="col-12"><div class="input-group"><span class="input-group-text">R</span><input type="text" id="r_sa_r" class="form-control" placeholder="Risikofaktoren"></div></div>
            </div>
        </div>

        <div class="section-title">7. Maßnahmen & Signatur</div>
        <div class="card p-3">
            <label class="form-label">Maßnahmen & Einsatzbericht</label>
            <textarea id="r_text" class="form-control mb-4" rows="8" placeholder="Eingeleitete Maßnahmen, Medikamente, Transportziel..."></textarea>
            
            <label class="form-label">Unterschrift</label>
            <canvas id="sig-rtw" class="sig-canvas"></canvas>
            <button type="button" class="btn btn-sm btn-link text-danger" onclick="sigRtw.clear()">Löschen</button>
        </div>

        <button type="submit" class="btn btn-rk w-100 py-4 mb-5 shadow-lg fs-4">🚨 PROTOKOLL ABSCHLIESSEN</button>
    </form>
</div>

<div class="modal fade" id="markerModal" tabindex="-1"><div class="modal-dialog modal-sm modal-dialog-centered"><div class="modal-content p-3 text-center">
    <h6 class="fw-bold mb-3">Befund wählen:</h6>
    <button onclick="place('Schmerz','S','m-pain')" class="btn btn-warning w-100 mb-2">🔥 Schmerz</button>
    <button onclick="place('Fraktur','F','m-bone')" class="btn btn-primary w-100 mb-2">🦴 Fraktur</button>
    <button onclick="place('Wunde','W','m-wound')" class="btn btn-danger w-100">🩸 Wunde</button>
</div></div></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.5/dist/signature_pad.umd.min.js"></script>
<script>
    const SUPABASE_URL = 'https://rnfbggoetkmgxqdvznrm.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJuZmJnZ29ldGttZ3hxZHZ6bnJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2ODc5OTAsImV4cCI6MjA5MDI2Mzk5MH0.WIkTaULzTAGgmWEdZ1au35ae826joFGVHP--E-2fsSg';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    let markers = [], curX, curY;
    const modal = new bootstrap.Modal(document.getElementById('markerModal'));
    const sigRtw = new SignaturePad(document.getElementById('sig-rtw'));

    function startFlow(type) {
        document.getElementById('listView').classList.remove('active-view');
        document.getElementById('mainAppRTW').classList.add('active-view');
        sigRtw.clear();
    }

    // Bodygramm Marker
    document.getElementById('bodyImg').onclick = function(e) {
        const rect = this.getBoundingClientRect();
        curX = (e.clientX - rect.left) / rect.width * 100;
        curY = (e.clientY - rect.top) / rect.height * 100;
        modal.show();
    };

    function place(l, s, c) {
        markers.push({x: Math.round(curX), y: Math.round(curY), type: l});
        const d = document.createElement('div'); d.className = 'marker ' + c;
        d.style.left = curX + '%'; d.style.top = curY + '%'; d.innerText = s;
        document.getElementById('bodyWrapper').appendChild(d);
        modal.hide();
    }

    function clearMarkers() { markers = []; document.querySelectorAll('.marker').forEach(m => m.remove()); }

    // Finales Senden
    document.getElementById('rtwForm').onsubmit = async (e) => { 
        e.preventDefault(); 
        const rtwDaten = {
            type: 'RTW_MAX_NO_GCS',
            abcde: {
                a: document.getElementById('r_abc_a').value, hws: document.getElementById('r_abc_hws').checked,
                b: { af: document.getElementById('r_v_af').value, spo2: document.getElementById('r_v_spo2').value, ausk: document.getElementById('r_abc_b_ausk').value },
                c: { hf: document.getElementById('r_v_hf').value, rr: document.getElementById('r_v_rr').value, rekap: document.getElementById('r_abc_c_rekap').value, haut: document.getElementById('r_abc_c_haut').value },
                d: { avpu: document.getElementById('r_v_avpu').value, bz: document.getElementById('r_v_bz').value, pup: document.getElementById('r_v_pup').value, fast: document.getElementById('r_d_fast').checked },
                e: { temp: document.getElementById('r_v_temp').value, info: document.getElementById('r_abc_e_text').value }
            },
            opqrst: {
                o: document.getElementById('r_op_o').value, p: document.getElementById('r_op_p').value, q: document.getElementById('r_op_q').value,
                r: document.getElementById('r_op_r').value, s: document.getElementById('r_op_s').value, t: document.getElementById('r_op_t').value
            },
            sampler: {
                s: document.getElementById('r_sa_s').value, a: document.getElementById('r_sa_a').value, m: document.getElementById('r_sa_m').value,
                p: document.getElementById('r_sa_p').value, l: document.getElementById('r_sa_l').value, e: document.getElementById('r_sa_e').value, r: document.getElementById('r_sa_r').value
            },
            bericht: document.getElementById('r_text').value,
            markers: markers
        };

        const { error } = await _supabase.from('rd_berichte').insert([{ 
            e_nr: document.getElementById('r_e_nr').value, 
            p_name: document.getElementById('r_p_name').value, 
            daten: rtwDaten 
        }]);

        if(!error) {
            alert("PROTOKOLL ERFOLGREICH ÜBERMITTELT!");
            location.reload();
        } else {
            alert("Fehler: " + error.message);
        }
    };
</script>
</body>
</html>
