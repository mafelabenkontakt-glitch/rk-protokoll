<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RK Einsatzdatenbank | Full System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --rk-red: #e2001a; --rk-dark: #b30014; }
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; font-size: 0.85rem; padding-bottom: 50px; }
        .header-rk { background-color: var(--rk-red); color: white; padding: 15px; text-align: center; border-bottom: 4px solid var(--rk-dark); margin-bottom: 15px; }
        .hidden { display: none !important; }
        .section-title { background: #343a40; color: white; padding: 6px 12px; font-weight: bold; border-left: 5px solid var(--rk-red); margin: 15px 0 8px 0; text-transform: uppercase; border-radius: 2px; }
        .card { border: none; box-shadow: 0 1px 4px rgba(0,0,0,0.1); border-radius: 8px; margin-bottom: 10px; }
        .form-label { font-weight: bold; color: #444; margin-bottom: 1px; font-size: 0.72rem; }
        
        /* Bodygramm Styles */
        .bodygramm-container { position: relative; width: 300px; margin: 0 auto; background: white; border: 1px solid #ccc; border-radius: 8px; padding: 5px; }
        .body-img { width: 100%; height: auto; cursor: crosshair; display: block; }
        .marker { position: absolute; width: 22px; height: 22px; border-radius: 50%; color: white; font-size: 10px; font-weight: bold; display: flex; align-items: center; justify-content: center; transform: translate(-50%, -50%); border: 2px solid white; pointer-events: none; }
        .m-pain { background: #fd7e14; } .m-bone { background: #0d6efd; } .m-wound { background: #dc3545; }
        
        .sig-canvas { border: 2px solid #ccc; background: #fff; width: 100%; height: 140px; border-radius: 4px; }
        .btn-rk { background: var(--rk-red); color: white; border: none; }
        .btn-rk:hover { background: var(--rk-dark); color: white; }
    </style>
</head>
<body>

<div class="header-rk shadow">
    <h4 class="m-0">ÖSTERREICHISCHES ROTES KREUZ</h4>
    <small>Einsatzdokumentation & Datenbank</small>
</div>

<div class="container">
    
    <div id="loginSection" class="row justify-content-center mt-5">
        <div class="col-md-4">
            <div class="card p-4 shadow">
                <h5 class="text-center mb-3">Zentral-Login</h5>
                <input type="text" id="username" class="form-control mb-2" placeholder="RK-Kennung">
                <input type="password" id="password" class="form-control mb-3" placeholder="Passwort">
                <button class="btn btn-rk w-100" onclick="attemptLogin()">Anmelden</button>
                <div id="loginError" class="text-danger mt-2 text-center small hidden">Zugriff verweigert!</div>
            </div>
        </div>
    </div>

    <div id="mainMenu" class="hidden text-center mt-4">
        <h5 id="welcomeMsg" class="mb-4"></h5>
        <div class="row g-3 justify-content-center">
            <div class="col-md-5">
                <button class="btn btn-rk w-100 p-4 shadow" onclick="showSection('protocolForm')">➕ NEUES PROTOKOLL</button>
            </div>
            <div id="adminBtn" class="col-md-5 hidden">
                <button class="btn btn-dark w-100 p-4 shadow" onclick="showSection('adminSection')">🛠 ADMIN & USER VERWALTUNG</button>
            </div>
            <div class="col-12 mt-3">
                <button class="btn btn-outline-secondary btn-sm" onclick="logout()">Abmelden</button>
            </div>
        </div>
    </div>

    <div id="protocolForm" class="hidden">
        <button class="btn btn-sm btn-secondary mb-3" onclick="showSection('mainMenu')">← Menü</button>
        <form id="einsatzForm">
            
            <div class="section-title">1. Einsatzdaten & Team</div>
            <div class="card p-3">
                <div class="row g-2">
                    <div class="col-md-4"><label class="form-label">Einsatz-Nr (ZID)</label><input type="text" id="e_nr" class="form-control form-control-sm"></div>
                    <div class="col-md-4"><label class="form-label">Fahrzeug</label><input type="text" id="fz" class="form-control form-control-sm"></div>
                    <div class="col-md-4"><label class="form-label">Einsatzart</label>
                        <select class="form-select form-select-sm"><option>Notfalleinsatz</option><option>Krankentransport</option></select>
                    </div>
                    <div class="col-6 col-md-2"><label class="form-label">Alarm</label><input type="time" class="form-control form-control-sm"></div>
                    <div class="col-6 col-md-2"><label class="form-label">Ankunft</label><input type="time" class="form-control form-control-sm"></div>
                    <div class="col-md-4"><label class="form-label">Transportführer</label><input type="text" class="form-control form-control-sm"></div>
                    <div class="col-md-4"><label class="form-label">Fahrer</label><input type="text" class="form-control form-control-sm"></div>
                </div>
            </div>

            <div class="section-title">2. Patientendaten</div>
            <div class="card p-3">
                <div class="row g-2">
                    <div class="col-12"><label class="form-label">Name</label><input type="text" id="p_name" class="form-control form-control-sm"></div>
                    <div class="col-6"><label class="form-label">Geburtsdatum</label><input type="date" class="form-control form-control-sm"></div>
                    <div class="col-6"><label class="form-label">SV-Nummer</label><input type="text" id="p_sv" class="form-control form-control-sm"></div>
                </div>
            </div>

            <div class="section-title">3. Befund (ABCDE)</div>
            <div class="card p-3">
                <div class="row g-2">
                    <div class="col-12"><label class="form-label text-danger">A (Airway)</label>
                        <select id="abc_a" class="form-select form-select-sm">
                            <option value="Frei">Frei</option><option value="Verlegt">Verlegt</option>
                        </select>
                    </div>
                    <div class="col-8"><label class="form-label text-danger">B (Breathing)</label><input type="text" id="abc_b" class="form-control form-control-sm"></div>
                    <div class="col-2"><label class="form-label">SpO2</label><input type="text" class="form-control form-control-sm"></div>
                    <div class="col-6"><label class="form-label text-danger">C (Circulation)</label><input type="text" id="abc_c" class="form-control form-control-sm"></div>
                    <div class="col-3"><label class="form-label">RR</label><input type="text" id="v_rr" class="form-control form-control-sm"></div>
                    <div class="col-3"><label class="form-label">Puls</label><input type="text" id="v_hf" class="form-control form-control-sm"></div>
                    <div class="col-6"><label class="form-label">AVPU</label>
                        <select id="v_avpu" class="form-select form-select-sm"><option>A (Alert)</option><option>V</option><option>P</option><option>U</option></select>
                    </div>
                    <div class="col-6"><label class="form-label text-danger">E (Exposure)</label><input type="text" id="abc_e" class="form-control form-control-sm"></div>
                </div>
            </div>

            <div class="section-title">4. Bodygramm</div>
            <div class="card p-3 text-center">
                <div class="bodygramm-container" id="bodyWrapper">
                    <img src="grafik.png" id="bodyImg" class="body-img" alt="Bodygramm Grafik">
                </div>
                <button type="button" class="btn btn-sm btn-outline-secondary mt-2" onclick="clearMarkers()">Marker löschen</button>
            </div>

            <div class="section-title">5. SAMPLER & OPQRST</div>
            <div class="card p-3">
                <div class="row g-1">
                    <div class="col-6"><label class="form-label">S (Symptome)</label><input type="text" id="s_s" class="form-control form-control-sm"></div>
                    <div class="col-6"><label class="form-label">A (Allergien)</label><input type="text" id="s_a" class="form-control form-control-sm"></div>
                    <div class="col-12"><label class="form-label">M (Medikamente)</label><input type="text" id="s_m" class="form-control form-control-sm"></div>
                    <div class="col-4"><label class="form-label">O (Onset)</label><input type="text" class="form-control form-control-sm"></div>
                    <div class="col-4"><label class="form-label">S (Stärke 1-10)</label><input type="text" class="form-control form-control-sm"></div>
                    <div class="col-4"><label class="form-label">T (Time)</label><input type="text" class="form-control form-control-sm"></div>
                </div>
            </div>

            <div class="section-title">6. Bericht & Unterschrift</div>
            <div class="card p-3">
                <textarea id="v_text" class="form-control mb-2" rows="3" placeholder="Maßnahmen..."></textarea>
                <canvas id="signature-pad" class="sig-canvas mb-1"></canvas>
                <button type="button" class="btn btn-sm btn-link text-danger p-0" onclick="signaturePad.clear()">Unterschrift löschen</button>
            </div>

            <button type="submit" class="btn btn-rk w-100 p-3 shadow mt-3">🚨 PROTOKOLL ABSENDEN</button>
        </form>
    </div>

    <div id="adminSection" class="hidden">
        <button class="btn btn-sm btn-secondary mb-3" onclick="showSection('mainMenu')">← Menü</button>
        <div class="card p-4 shadow">
            <h5>Benutzerverwaltung</h5>
            <table class="table table-sm mt-3">
                <thead><tr><th>Name</th><th>Rolle</th><th>Aktion</th></tr></thead>
                <tbody id="userTable"></tbody>
            </table>
            <hr>
            <h6>Neuen Nutzer anlegen</h6>
            <div class="row g-2">
                <div class="col-md-4"><input type="text" id="newU" class="form-control" placeholder="Benutzername"></div>
                <div class="col-md-4"><input type="text" id="newP" class="form-control" placeholder="Passwort"></div>
                <div class="col-md-2">
                    <select id="newR" class="form-select"><option value="user">User</option><option value="admin">Admin</option></select>
                </div>
                <div class="col-md-2"><button class="btn btn-success w-100" onclick="addUser()">Hinzufügen</button></div>
            </div>
        </div>
    </div>

</div>

<div class="modal fade" id="markerModal" tabindex="-1"><div class="modal-dialog modal-sm modal-dialog-centered"><div class="modal-content text-center p-3">
    <button onclick="place('Schmerz','S','m-pain')" class="btn btn-warning w-100 mb-2">Schmerz (S)</button>
    <button onclick="place('Fraktur','F','m-bone')" class="btn btn-primary w-100 mb-2">Fraktur (F)</button>
    <button onclick="place('Wunde','W','m-wound')" class="btn btn-danger w-100">Wunde (W)</button>
</div></div></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.5/dist/signature_pad.umd.min.js"></script>

<script>
    let users = [{u: "RK-02", p: "AppearIron22", r: "admin"}];
    let markers = [], curX, curY;
    const modal = new bootstrap.Modal(document.getElementById('markerModal'));
    const signaturePad = new SignaturePad(document.getElementById('signature-pad'));

    // Login Logik
    function attemptLogin() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        const found = users.find(x => x.u === u && x.p === p);
        if(found) {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('mainMenu').classList.remove('hidden');
            document.getElementById('welcomeMsg').innerText = `Hallo, ${found.u}`;
            if(found.r === 'admin') document.getElementById('adminBtn').classList.remove('hidden');
            renderUserTable();
        } else {
            document.getElementById('loginError').classList.remove('hidden');
        }
    }

    function logout() { location.reload(); }

    function showSection(id) {
        document.getElementById('mainMenu').classList.add('hidden');
        document.getElementById('protocolForm').classList.add('hidden');
        document.getElementById('adminSection').classList.add('hidden');
        document.getElementById(id).classList.remove('hidden');
    }

    // Admin Funktionen
    function renderUserTable() {
        const tbody = document.getElementById('userTable');
        tbody.innerHTML = '';
        users.forEach((user, i) => {
            tbody.innerHTML += `<tr><td>${user.u}</td><td>${user.r}</td><td>${user.u !== 'RK-02' ? `<button class="btn btn-danger btn-sm" onclick="deleteUser(${i})">X</button>` : '-'}</td></tr>`;
        });
    }

    function addUser() {
        const u = document.getElementById('newU').value, p = document.getElementById('newP').value, r = document.getElementById('newR').value;
        if(u && p) { users.push({u, p, r}); renderUserTable(); }
    }

    function deleteUser(i) { users.splice(i, 1); renderUserTable(); }

    // Bodygramm Logik
    document.getElementById('bodyImg').onclick = function(e) {
        const rect = this.getBoundingClientRect();
        curX = (e.clientX - rect.left) / rect.width * 100;
        curY = (e.clientY - rect.top) / rect.height * 100;
        modal.show();
    };

    function place(l, s, c) {
        markers.push({x: curX, y: curY, type: l});
        const d = document.createElement('div');
        d.className = 'marker ' + c; d.style.left = curX + '%'; d.style.top = curY + '%'; d.innerText = s;
        document.getElementById('bodyWrapper').appendChild(d);
        modal.hide();
    }

    function clearMarkers() { markers = []; document.querySelectorAll('.marker').forEach(m => m.remove()); }

    document.getElementById('einsatzForm').onsubmit = (e) => {
        e.preventDefault();
        alert("🚨 Protokoll gesendet!");
        showSection('mainMenu');
    };
</script>
</body>
</html>
