<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RK Einsatzprotokoll | Cloud & Discord Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --rk-red: #e2001a; --rk-dark: #b30014; }
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; padding-bottom: 80px; font-size: 0.85rem; }
        .header-rk { background-color: var(--rk-red); color: white; padding: 15px; text-align: center; border-bottom: 4px solid var(--rk-dark); margin-bottom: 15px; }
        .logo-svg { width: 140px; height: auto; fill: white; }
        .hidden { display: none !important; }
        .section-title { background: #343a40; color: white; padding: 6px 12px; font-weight: bold; border-left: 5px solid var(--rk-red); margin: 15px 0 8px 0; text-transform: uppercase; border-radius: 2px; }
        .card { border: none; box-shadow: 0 1px 4px rgba(0,0,0,0.1); border-radius: 8px; margin-bottom: 10px; }
        .form-label { font-weight: bold; color: #444; margin-bottom: 1px; font-size: 0.72rem; }
        .bodygramm-container { position: relative; width: 300px; margin: 0 auto; background: white; border: 1px solid #ccc; border-radius: 8px; padding: 5px; }
        .body-img { width: 100%; height: auto; cursor: crosshair; display: block; }
        .marker { position: absolute; width: 22px; height: 22px; border-radius: 50%; color: white; font-size: 10px; font-weight: bold; display: flex; align-items: center; justify-content: center; transform: translate(-50%, -50%); border: 2px solid white; pointer-events: none; }
        .m-pain { background: #fd7e14; } .m-bone { background: #0d6efd; } .m-wound { background: #dc3545; }
        .sig-canvas { border: 2px solid #ccc; background: #fff; width: 100%; height: 140px; border-radius: 4px; touch-action: none; }
        .btn-send { background: var(--rk-red); color: white; border: none; padding: 15px; width: 100%; font-weight: bold; margin-top: 10px; border-radius: 10px; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="header-rk shadow">
    <svg class="logo-svg" viewBox="0 0 300 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M40 20h20v20h20v20h-20v20h-20v-20h-20v-20h20z" fill="white"/>
        <text x="100" y="55" font-family="Arial" font-weight="bold" font-size="24" fill="white">ROTES KREUZ</text>
    </svg>
</div>

<div class="container">
    <div id="loginSection" class="row justify-content-center mt-4">
        <div class="col-md-4"><div class="card p-4 shadow text-center">
            <h6 class="mb-3">Sanitäter Anmeldung</h6>
            <input type="text" id="username" class="form-control mb-2" placeholder="RK-Kennung">
            <input type="text" id="password" class="form-control mb-3" placeholder="Passwort">
            <button class="btn btn-danger w-100" id="loginBtn" onclick="attemptLogin()">ANMELDEN</button>
            <div id="loginError" class="text-danger mt-2 small hidden">Zugriff verweigert!</div>
        </div></div>
    </div>

    <div id="mainMenu" class="hidden text-center mt-4">
        <div class="row g-2 justify-content-center">
            <div class="col-md-4"><button class="btn btn-danger w-100 p-4 shadow" onclick="showSection('protocolForm')">➕ NEUES PROTOKOLL</button></div>
            <div class="col-md-4"><button class="btn btn-info w-100 p-4 shadow text-white" onclick="openArchive()">📜 CLOUD ARCHIV</button></div>
            <div id="adminBtn" class="col-md-4 hidden"><button class="btn btn-dark w-100 p-4 shadow" onclick="openAdmin()">🛠 ADMIN</button></div>
            <div class="col-12 mt-3"><button class="btn btn-link btn-sm text-muted" onclick="logout()">Abmelden</button></div>
        </div>
    </div>

    <div id="protocolForm" class="hidden">
        <button class="btn btn-sm btn-secondary mb-2" onclick="showSection('mainMenu')">← Menü</button>
        <form id="einsatzForm">
            <div class="section-title">1. Einsatz & Team</div>
            <div class="card p-3">
                <div class="row g-2">
                    <div class="col-6"><label class="form-label">Einsatz-Nr</label><input type="text" id="e_nr" class="form-control form-control-sm"></div>
                    <div class="col-6"><label class="form-label">Fahrzeug</label><input type="text" id="fz" class="form-control form-control-sm"></div>
                    <div class="col-12"><label class="form-label">Team</label><input type="text" id="team" class="form-control form-control-sm"></div>
                </div>
            </div>

            <div class="section-title">2. Patient & ABCDE</div>
            <div class="card p-3">
                <div class="row g-2">
                    <div class="col-12"><label class="form-label">Name Patient</label><input type="text" id="p_name" class="form-control form-control-sm" required></div>
                    <div class="col-4"><label class="form-label">AVPU</label>
                        <select id="v_avpu" class="form-select form-select-sm">
                            <option value="A">A</option><option value="V">V</option><option value="P">P</option><option value="U">U</option>
                        </select>
                    </div>
                    <div class="col-4"><label class="form-label">RR</label><input type="text" id="v_rr" class="form-control form-control-sm"></div>
                    <div class="col-4"><label class="form-label">HF</label><input type="text" id="v_hf" class="form-control form-control-sm"></div>
                </div>
            </div>

            <div class="section-title text-center">3. Bodygramm</div>
            <div class="bodygramm-container shadow-sm" id="bodyWrapper">
                <img src="https://via.placeholder.com/300x450?text=Körpergrafik" id="bodyImg" class="body-img">
            </div>
            <button type="button" class="btn btn-sm btn-outline-secondary w-100 mt-2" onclick="clearMarkers()">Marker löschen</button>

            <div class="section-title">4. SAMPLER / OPQRST</div>
            <div class="card p-3">
                <textarea id="v_text" class="form-control" rows="3" placeholder="Zusammenfassung Maßnahmen..."></textarea>
            </div>

            <div class="section-title">5. Unterschrift</div>
            <div class="card p-2 text-center">
                <canvas id="signature-pad" class="sig-canvas"></canvas>
            </div>

            <button type="submit" class="btn btn-send shadow">🚨 PROTOKOLL ABSENDEN</button>
        </form>
    </div>

    <div id="archiveSection" class="hidden">
        <button class="btn btn-sm btn-secondary mb-2" onclick="showSection('mainMenu')">← Menü</button>
        <div class="card p-3 shadow">
            <h6>📜 CLOUD ARCHIV (Zuletzt gesendet)</h6>
            <div class="table-responsive">
                <table class="table table-sm table-striped mt-2">
                    <thead><tr><th>ZID</th><th>Patient</th><th>Sanitäter</th><th>Aktion</th></tr></thead>
                    <tbody id="archiveTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="adminSection" class="hidden">
        <button class="btn btn-sm btn-secondary mb-2" onclick="showSection('mainMenu')">← Menü</button>
        <div class="card p-3 shadow">
            <h6>🛠 BENUTZERVERWALTUNG</h6>
            <div id="userList" class="mb-3"></div>
            <hr>
            <div class="row g-1">
                <div class="col-5"><input type="text" id="newU" class="form-control form-control-sm" placeholder="User"></div>
                <div class="col-4"><input type="text" id="newP" class="form-control form-control-sm" placeholder="PW"></div>
                <div class="col-3"><button class="btn btn-success btn-sm w-100" onclick="addUser()">+</button></div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="markerModal" tabindex="-1"><div class="modal-dialog modal-sm modal-dialog-centered"><div class="modal-content text-center p-3">
    <button onclick="place('Schmerz','S','m-pain')" class="btn btn-warning w-100 mb-2">Schmerz (S)</button>
    <button onclick="place('Fraktur','F','m-bone')" class="btn btn-primary w-100 mb-2">Fraktur (F)</button>
    <button onclick="place('Wunde','W','m-wound')" class="btn btn-danger w-100">Wunde (W)</button>
</div></div></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.5/dist/signature_pad.umd.min.js"></script>

<script>
    // --- KONFIGURATION ---
    const SB_URL = "https://rnfbggoetkmgxqdvznrm.supabase.co";
    const SB_KEY = "sb_publishable_Ilcxhb0I07LY9r_dqBUSXg_mcfljlc4";
    const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1487187005485093155/BrI0fLWg7rhSLDnRJBzM5oxyhl0vGIoBs7HHGsbrsgFhXmY-RlS8TLKrBAH7MyJpVzQT";
    
    const sb = supabase.createClient(SB_URL, SB_KEY);
    let currentUser = null, markers = [], curX, curY;
    const modal = new bootstrap.Modal(document.getElementById('markerModal'));
    const signaturePad = new SignaturePad(document.getElementById('signature-pad'));

    // --- LOGIN ---
    async function attemptLogin() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        const { data, error } = await sb.from('rk_users').select('*').eq('u', u).eq('p', p).single();

        if (data) {
            currentUser = data;
            showSection('mainMenu');
            if(data.r === 'admin') document.getElementById('adminBtn').classList.remove('hidden');
        } else {
            document.getElementById('loginError').classList.remove('hidden');
        }
    }

    // --- ADMIN ---
    async function renderUsers() {
        const { data } = await sb.from('rk_users').select('*');
        if (data) {
            document.getElementById('userList').innerHTML = data.map(u => `
                <div class="d-flex justify-content-between py-2 border-bottom">
                    <span>${u.u} (${u.r})</span>
                    ${u.u !== 'RK-02' ? `<button onclick="delU('${u.id}')" class="btn btn-danger btn-xs">X</button>` : ''}
                </div>
            `).join('');
        }
    }

    async function addUser() {
        const u = document.getElementById('newU').value;
        const p = document.getElementById('newP').value;
        if(!u || !p) return;
        await sb.from('rk_users').insert([{ u, p, r: 'user' }]);
        renderUsers();
    }

    async function delU(id) { await sb.from('rk_users').delete().eq('id', id); renderUsers(); }

    // --- PROTOKOLL ABSENDEN (Discord + Cloud) ---
    document.getElementById('einsatzForm').onsubmit = async function(e) {
        e.preventDefault();
        const btn = document.querySelector('.btn-send');
        btn.innerText = "Sende an Discord & Cloud...";
        btn.disabled = true;

        const zid = document.getElementById('e_nr').value;
        const patient = document.getElementById('p_name').value;

        // 1. In Supabase Archiv speichern
        const { error: sbErr } = await sb.from('rk_reports').insert([{ zid, patient, san: currentUser.u }]);

        // 2. An Discord senden
        const formData = new FormData();
        const mainEmbed = {
            title: "🚑 NEUES PROTOKOLL: " + zid,
            color: 14811162,
            fields: [
                { name: "Sanitäter", value: currentUser.u, inline: true },
                { name: "Patient", value: patient, inline: true },
                { name: "Befund", value: `AVPU: ${document.getElementById('v_avpu').value} | RR: ${document.getElementById('v_rr').value}` }
            ],
            timestamp: new Date()
        };
        formData.append('payload_json', JSON.stringify({ embeds: [mainEmbed] }));

        try {
            await fetch(DISCORD_WEBHOOK, { method: 'POST', body: formData });
            alert("✅ Gespeichert und an Discord gesendet!");
            showSection('mainMenu');
            this.reset();
            clearMarkers();
            signaturePad.clear();
        } catch(err) {
            alert("Fehler beim Senden!");
        } finally {
            btn.innerText = "🚨 PROTOKOLL ABSENDEN";
            btn.disabled = false;
        }
    };

    // --- ARCHIV ---
    async function openArchive() {
        showSection('archiveSection');
        const { data } = await sb.from('rk_reports').select('*').order('created_at', {ascending: false});
        if (data) {
            document.getElementById('archiveTable').innerHTML = data.map(r => `
                <tr><td>${r.zid}</td><td>${r.patient}</td><td>${r.san}</td>
                <td><button class="btn btn-danger btn-sm" onclick="delRep('${r.id}')">X</button></td></tr>
            `).join('');
        }
    }
    async function delRep(id) { await sb.from('rk_reports').delete().eq('id', id); openArchive(); }

    // --- UI HELPER ---
    function showSection(id) {
        document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }
    function logout() { location.reload(); }
    function openAdmin() { showSection('adminSection'); renderUsers(); }
    
    // Bodygramm Logik
    document.getElementById('bodyImg').onclick = function(e) {
        const rect = this.getBoundingClientRect();
        curX = (e.clientX - rect.left) / rect.width * 100;
        curY = (e.clientY - rect.top) / rect.height * 100;
        modal.show();
    };
    function place(l, s, c) {
        const d = document.createElement('div');
        d.className = 'marker ' + c; d.style.left = curX + '%'; d.style.top = curY + '%'; d.innerText = s;
        document.getElementById('bodyWrapper').appendChild(d);
        modal.hide();
    }
    function clearMarkers() { document.querySelectorAll('.marker').forEach(m => m.remove()); }
</script>
</body>
</html>
