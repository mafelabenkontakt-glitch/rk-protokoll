<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, maximum-scale=1.0">
<title>RK CLOUD OS – RTW/KTW</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
:root {
    --rk-red: #E2001A;
    --rk-darkred: #B30014;
    --grey: #2C3E50;
    --bg: #ffffff;
    --fg: #000000;
}

[data-theme="dark"] {
    --bg: #121212;
    --fg: #e5e5e5;
}

body {
    background: var(--bg);
    color: var(--fg);
    font-family: "Segoe UI", sans-serif;
}

.active-view { display:block!important; }
#loginView,#listView,#flowSelect,#mainAppRTW,#mainAppKTW{display:none}

/* Header */
.rk-header{
    background:var(--bg);
    border-bottom:4px solid var(--rk-red);
    padding:15px;
    border-radius:10px;
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* Cards */
.card-custom{
    background:var(--bg);
    border:1px solid #ccc;
    border-radius:16px;
    padding:20px;
    margin-bottom:15px;
}

/* Sections */
.section-header{
    background:var(--grey);
    color:white;
    padding:12px;
    font-weight:bold;
    border-left:8px solid var(--rk-red);
    border-radius:8px;
    margin:30px 0 15px;
}

/* Login */
#loginView{
    position:fixed;
    inset:0;
    background:linear-gradient(135deg,var(--rk-red),var(--rk-darkred));
    display:flex;
    justify-content:center;
    align-items:center;
}
.login-card{
    background:white;
    padding:35px;
    border-radius:20px;
    width:90%;
    max-width:400px;
    text-align:center;
}

/* KTW "A" Button */
.ktw-button-a{
    font-size:80px;
    font-weight:bold;
    padding:40px;
    width:100%;
    border-radius:30px;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginView" class="active-view">
    <div class="login-card">
        <h2 class="fw-bold text-danger">RK CLOUD LOGIN</h2>

        <input id="login_dn" class="form-control mt-4 mb-3 p-3 text-center rounded-pill" placeholder="Dienstnummer">
        <input id="login_pw" type="password" class="form-control mb-4 p-3 text-center rounded-pill" placeholder="Passwort">

        <button onclick="handleLogin()" class="btn btn-danger w-100 py-3 fw-bold rounded-pill">
            LOGIN
        </button>

        <div id="loginError" class="mt-3 text-danger small fw-bold"></div>
    </div>
</div>

<!-- JOURNAL -->
<div id="listView" class="container py-3">
    <div class="rk-header">
        <h4 class="fw-bold">EINSATZ‑JOURNAL</h4>
        <button class="btn btn-danger rounded-pill fw-bold" onclick="showView('flowSelect')">+ NEU</button>
    </div>
    <div id="protocolList"></div>
</div>

<!-- FLOW SELECT -->
<div id="flowSelect" class="container text-center py-5">
    <h2 class="fw-bold mb-4">PROTOKOLL-TYP</h2>

    <div class="row g-3">
        <div class="col-6">
            <button onclick="startFlow('RTW')" class="btn btn-danger w-100 py-4 rounded-4 fw-bold fs-3">🚑 RTW</button>
        </div>
        <div class="col-6">
            <button onclick="startFlow('KTW')" class="btn btn-primary w-100 py-4 rounded-4 fw-bold fs-3">🚐 KTW</button>
        </div>
    </div>
</div>

<!-- KTW FORM -->
<div id="mainAppKTW" class="container pb-5">
    <div class="rk-header">
        <button class="btn btn-outline-secondary btn-sm" onclick="showView('listView')">⬅ Zurück</button>
        <h5 class="fw-bold m-0">KTW‑PROTO</h5>
    </div>

    <div class="section-header">1. PATIENT & EINSATZ</div>
    <div class="card-custom">
        <input id="k_einsatz" class="form-control mb-3 p-3" placeholder="Einsatznummer">
        <input id="k_name" class="form-control mb-3 p-3" placeholder="Patientenname">
        <input id="k_info" class="form-control p-3" placeholder="Transportinfo / Ziel">
    </div>

    <div class="section-header">2. TRANSPORT</div>
    <div class="card-custom text-center">
        <!-- Der einzige Button -->
        <button class="btn btn-warning ktw-button-a" onclick="toggleA()">A</button>
        <p class="mt-3 fw-bold">Aktueller Status: <span id="aState" class="text-danger">Nicht aktiviert</span></p>
    </div>

    <div class="section-header">3. BERICHT</div>
    <div class="card-custom">
        <textarea id="k_bericht" class="form-control" rows="6" placeholder="Transportbericht..."></textarea>
    </div>

    <button onclick="submitKTW()" class="btn btn-danger w-100 py-4 rounded-pill fw-bold fs-4">
        ABSENDEN
    </button>
</div>

<script>
let user = null;

// LOGIN
async function handleLogin() {
    let dn = login_dn.value.trim();
    let pw = login_pw.value.trim();

    if(dn === "" || pw === "") {
        loginError.innerText = "Bitte alles ausfüllen!";
        return;
    }

    // Demo-Login
    user = { dienstnummer: dn };
    showView("listView");
}

// VIEW
function showView(id){
    document.querySelectorAll(".active-view").forEach(v=>v.classList.remove("active-view"));
    document.getElementById(id).classList.add("active-view");
}

// FLOW
function startFlow(type){
    if(type === "KTW") showView("mainAppKTW");
    if(type === "RTW") showView("mainAppRTW");
}

/* KTW A-Button */
let a = false;
function toggleA(){
    a = !a;
    aState.innerText = a ? "AKTIV" : "Nicht aktiviert";
    aState.style.color = a ? "green" : "red";
}

/* KTW SEND */
function submitKTW(){
    const data = {
        typ:"KTW",
        einsatz:k_einsatz.value,
        name:k_name.value,
        info:k_info.value,
        a_status:a,
        bericht:k_bericht.value
    };

    console.log("KTW gespeichert:", data);
    alert("KTW‑Protokoll übermittelt!");
    location.reload();
}
</script>

</body>
</html>
