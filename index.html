<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RK LOGIN FIX</title>

<!-- ✅ WICHTIG: richtiger Supabase Import -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body {
    margin:0;
    font-family:Arial;
}

/* LOGIN */
#loginView {
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#e2001a;
}

.card {
    background:white;
    padding:30px;
    border-radius:15px;
    text-align:center;
}

button {
    background:#e2001a;
    color:white;
    border:none;
    padding:10px;
    width:100%;
    margin-top:10px;
}
</style>
</head>

<body>

<div id="loginView">
    <div class="card">
        <h2>RK LOGIN</h2>

        <input id="dn" placeholder="Dienstnummer"><br><br>
        <input id="pw" type="password" placeholder="Passwort"><br><br>

        <button id="loginBtn">LOGIN</button>

        <div id="status"></div>
    </div>
</div>

<script>

// ✅ SUPABASE FIX
const SUPABASE_URL = "https://rnfbggoetkmgxqdvznrm.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJuZmJnZ29ldGttZ3hxZHZ6bnJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2ODc5OTAsImV4cCI6MjA5MDI2Mzk5MH0.WIkTaULzTAGgmWEdZ1au35ae826joFGVHP--E-2fsSg";

// ⚠️ WICHTIG: v2 Syntax
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// DEBUG
console.log("Supabase geladen:", db);

// BUTTON FIX
document.getElementById("loginBtn").addEventListener("click", login);

async function login(){

    const dnVal = document.getElementById("dn").value.trim();
    const pwVal = document.getElementById("pw").value.trim();
    const status = document.getElementById("status");

    status.innerText = "prüfe...";

    try {

        const { data, error } = await db
            .from("profiles")
            .select("*")
            .eq("dienstnummer", dnVal)
            .maybeSingle();

        console.log("Antwort:", data, error);

        if(error){
            status.innerText = "DB Fehler!";
            console.log(error);
            return;
        }

        if(!data){
            status.innerText = "User nicht gefunden!";
            return;
        }

        if(data.passwort !== pwVal){
            status.innerText = "Passwort falsch!";
            return;
        }

        status.innerText = "LOGIN ERFOLGREICH ✅";

        // 👉 TEST: Weiterleitung
        setTimeout(()=>{
            alert("Login funktioniert!");
        },500);

    } catch(err){
        status.innerText = "JS Fehler!";
        console.log(err);
    }
}

</script>

</body>
</html>
